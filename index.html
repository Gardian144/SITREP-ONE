<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { background: #050505; color: #00ff66; font-family: 'JetBrains Mono'; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        #map { height: 100%; background: #000 !important; width: 100%; }
        .panel { background: rgba(0, 10, 0, 0.9); border: 1px solid #004411; }

        /* EFFET RADAR SCAN */
        #map::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,255,102,0.05) 0%, rgba(0,255,102,0) 50%);
            background-size: 100% 200%; animation: scan 4s linear infinite;
            pointer-events: none; z-index: 1000;
        }
        @keyframes scan { 0% { background-position: 0% 100%; } 100% { background-position: 0% 0%; } }

        /* ALERTE ROUGE */
        .emergency-border {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            border: 8px solid #ff0000; box-shadow: inset 0 0 50px #7f0000;
            z-index: 9999; pointer-events: none; animation: alert-flash 1s infinite; display: none;
        }
        @keyframes alert-flash { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }

        /* --- STRUCTURE ADAPTIVE --- */
        #main-container { display: flex; flex-direction: column; flex-grow: 1; }

        /* MOBILE : Empilement vertical strict */
        aside#sidebar { 
            width: 100%; height: 45vh; order: 1; border-bottom: 2px solid #004411; 
            overflow: hidden; display: flex; flex-direction: column;
        }
        #map-container { width: 100%; height: 45vh; order: 2; position: relative; }

        /* DESKTOP : Passage en côte à côte */
        @media (min-width: 769px) {
            body { height: 100vh; overflow: hidden; }
            #main-container { flex-direction: row; }
            aside#sidebar { width: 350px; height: 100%; order: 1; border-right: 2px solid #004411; border-bottom: none; }
            #map-container { flex-grow: 1; height: 100%; order: 2; }
        }

        .alert-bar { background: #450a0a; border-bottom: 1px solid #ef4444; color: #fca5a5; padding: 8px 0; font-size: 11px; overflow: hidden; white-space: nowrap; }
        .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 120s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        
        #critical-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(139, 0, 0, 0.95); border: 2px solid #ff0000; color: white;
            padding: 20px; z-index: 10000; display: none; text-align: center; width: 85%;
        }
    </style>
</head>
<body>
    <div id="emergency-overlay" class="emergency-border"></div>
    <div id="critical-popup"><h2 id="popup-text" class="text-xl font-bold uppercase"></h2></div>

    <header class="p-3 panel flex justify-between items-center shrink-0 border-b border-green-900/50">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[10px] font-bold tracking-widest uppercase text-white">SITREP-ONE // COMMAND</h1>
        </div>
        <div class="flex gap-3 items-center text-[9px]">
            <span id="update-time" class="text-green-500">SYNC: --:--</span>
            <a href="france.html" class="bg-blue-900 px-3 py-1 text-white font-bold uppercase">France</a>
        </div>
    </header>

    <div class="alert-bar uppercase font-bold">
        <div id="marquee-text" class="marquee-content">SCANNING SECTORS...</div>
    </div>

    <div id="main-container">
        <aside id="sidebar" class="panel p-4">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <div class="bg-green-900/10 p-2 border border-green-900/30 text-center">
                    <p class="text-[8px] opacity-50 uppercase font-bold">Alertes NASA</p>
                    <p id="count-impacts" class="text-xl font-bold text-white">00</p>
                </div>
                <div class="bg-green-900/10 p-2 border border-green-900/30 text-center">
                    <p class="text-[8px] opacity-50 uppercase font-bold">Dernier Intel</p>
                    <p id="latest-time" class="text-xl font-bold text-white">--:--</p>
                </div>
            </div>
            <h2 class="text-[10px] font-bold text-red-500 mb-2 uppercase border-b border-red-900/40 pb-1 italic">Intel Stream</h2>
            <div id="news-feed" class="overflow-y-auto flex-grow space-y-3 pr-1"></div>
        </aside>

        <div id="map-container">
            <div class="filter-btns absolute top-4 left-1/2 -translate-x-1/2 z-[1001] flex gap-1">
                <button onclick="filterByCountry('ALL', [32, 53], 4)" class="bg-black/80 border border-green-900 px-2 py-1 text-[8px] text-green-400 font-bold uppercase">Global</button>
                <button onclick="filterByCountry('IRAN', [32.4, 53.6], 5)" class="bg-black/80 border border-red-900 px-2 py-1 text-[8px] text-red-500 font-bold uppercase">Iran</button>
                <button onclick="filterByCountry('ISRAËL', [31.5, 34.8], 7)" class="bg-black/80 border border-blue-900 px-2 py-1 text-[8px] text-blue-500 font-bold uppercase">Israël</button>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let allNewsData = [];
        let lastUrgentId = null;

        function updateNewsDisplay() {
            const feed = document.getElementById('news-feed');
            feed.innerHTML = allNewsData.map(n => `
                <div class="p-3 border-l-2 ${n.urgent ? 'bg-red-900/20 border-red-600' : 'bg-green-900/5 border-green-800'} text-[10px]">
                    <div class="flex justify-between text-[8px] opacity-60 mb-1 font-bold"><span>${n.source}</span><span>${n.time}</span></div>
                    <p class="text-white uppercase font-bold leading-tight">${n.text}</p>
                </div>
            `).join('');
        }

        async function refreshData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                allNewsData = d.news || [];
                document.getElementById('update-time').innerText = "SYNC: " + d.last_update;
                document.getElementById('count-impacts').innerText = (d.impacts || []).length;
                if (allNewsData.length > 0) document.getElementById('latest-time').innerText = allNewsData[0].time;

                const urgentNews = allNewsData.filter(n => n.urgent);
                if(urgentNews.length > 0 && urgentNews[0].id !== lastUrgentId) {
                    lastUrgentId = urgentNews[0].id;
                    document.getElementById('emergency-overlay').style.display = 'block';
                    document.getElementById('critical-popup').style.display = 'block';
                    document.getElementById('popup-text').innerText = urgentNews[0].text;
                    setTimeout(() => {
                        document.getElementById('emergency-overlay').style.display = 'none';
                        document.getElementById('critical-popup').style.display = 'none';
                    }, 6000);
                }
                updateNewsDisplay();
            } catch(e) { console.error(e); }
        }

        function filterByCountry(c, coords, z) { map.flyTo(coords, z, {duration: 1.5}); }
        setInterval(refreshData, 30000); refreshData();
        window.addEventListener('resize', () => map.invalidateSize());
    </script>
</body>
</html>
