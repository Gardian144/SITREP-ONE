<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { background: #050505; color: #00ff66; font-family: 'JetBrains Mono'; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #map { height: 100%; background: #000 !important; }
        .panel { background: rgba(0, 10, 0, 0.9); border: 1px solid #004411; }

        /* --- RÉGLAGE VITESSE ICI --- */
        .alert-bar { 
            background: #450a0a; 
            border-bottom: 1px solid #ef4444; 
            color: #fca5a5; 
            padding: 12px 0; 
            font-size: 14px; 
            font-weight: bold; 
            overflow: hidden; 
            white-space: nowrap;
            display: flex;
            align-items: center;
        }

        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            /* Modifie "160s" pour ajuster la vitesse globale */
            animation: scroll-left 120s linear infinite; 
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #004411; }
    </style>
</head>
<body class="flex flex-col">
    <header class="p-3 panel flex justify-between items-center shrink-0 border-b border-green-900/50">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[10px] md:text-xs font-bold tracking-widest uppercase text-white">SITREP-ONE // LIVE_SYSTEM</h1>
        </div>
        <div class="flex gap-4 items-center text-[9px]">
            <span id="update-time" class="opacity-50 font-mono text-green-500">SYNC: --:--</span>
            <a href="france.html" class="bg-blue-900 px-3 py-1 text-white font-bold transition-all hover:bg-blue-700 uppercase">Unité France</a>
        </div>
    </header>

    <div id="alert-zone" class="alert-bar tracking-[0.3em] uppercase">
        <div id="marquee-text" class="marquee-content">
            CHARGEMENT DES PRIORITÉS ALPHA ... SYNCHRONISATION ...
        </div>
    </div>

    <div id="main-container" class="relative flex flex-grow overflow-hidden">
        <aside class="w-80 panel p-4 z-[1000] flex flex-col shrink-0 border-r border-green-900/30">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <div class="bg-green-900/10 p-2 border border-green-900/30 text-center">
                    <p class="text-[8px] opacity-50 uppercase font-bold">Alertes NASA</p>
                    <p id="count-impacts" class="text-xl font-bold text-white">00</p>
                </div>
                <div class="bg-green-900/10 p-2 border border-green-900/30 text-center">
                    <p class="text-[8px] opacity-50 uppercase font-bold">Dernier Intel</p>
                    <p id="latest-time" class="text-xl font-bold text-white">--:--</p>
                </div>
            </div>

            <h2 class="text-[10px] font-bold text-red-500 mb-2 uppercase tracking-tighter border-b border-red-900/40 pb-1 italic">Flux de Renseignement</h2>
            <div id="news-feed" class="space-y-3 overflow-y-auto flex-grow pr-2 font-bold"></div>
            
            <a href="archives.html" class="mt-4 block text-center border border-green-900 py-2 text-[9px] hover:bg-green-900/20 transition-all uppercase text-green-400 font-bold">
                Accéder aux archives
            </a>
        </aside>

        <div id="map-container" class="flex-grow">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function refreshData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                
                document.getElementById('update-time').innerText = "SYNC: " + d.last_update;
                document.getElementById('count-impacts').innerText = (d.impacts || []).length;

                const news = d.news || [];
                const urgentNews = news.filter(n => n.urgent);
                const normalNews = news.filter(n => !n.urgent);
                const finalNews = [...urgentNews, ...normalNews];

                if(finalNews.length > 0) {
                    document.getElementById('latest-time').innerText = finalNews[0].time || "--:--";
                }

                document.getElementById('news-feed').innerHTML = finalNews.map(n => `
                    <div class="p-3 border-l-2 ${n.urgent ? 'bg-red-900/20 border-red-600' : 'bg-green-900/5 border-green-800'} text-[10px] mb-2">
                        <div class="flex justify-between text-[8px] opacity-60 mb-1 italic font-bold">
                            <span>${n.source || 'INTEL'} // ${n.date}</span>
                            <span class="text-white">${n.time}</span>
                        </div>
                        <p class="text-white leading-tight uppercase font-bold tracking-tighter">${n.text}</p>
                    </div>
                `).join('');

                // --- LIMITATION À 3 INFOS ---
                const marqueeElement = document.getElementById('marquee-text');
                const topThree = urgentNews.slice(0, 3); 
                
                if (topThree.length > 0) {
                    const textContent = topThree.map(n => ` [ ${n.time} ] ${n.text} `).join('  ///  ');
                    // On répète pour que la boucle soit infinie sans trou
                    marqueeElement.innerText = textContent + "  ///  " + textContent;
                } else {
                    marqueeElement.innerText = "VEILLE RADAR ACTIVE /// AUCUNE ALERTE CRITIQUE /// " + d.last_update;
                }
                
            } catch(e) { console.error("Data error", e); }
        }

        setInterval(refreshData, 30000); 
        refreshData();
    </script>
</body>
</html>
