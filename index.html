<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { background: #050505; color: #00ff66; font-family: 'JetBrains Mono'; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #map { height: 100%; width: 100%; background: #000 !important; }
        .panel { background: rgba(0, 10, 0, 0.9); border: 1px solid #004411; }

        /* BANDEAU ALERTES */
        .alert-bar { 
            background: #450a0a; border-bottom: 1px solid #ef4444; color: #fca5a5; 
            padding: 8px 0; font-size: 11px; font-weight: bold; overflow: hidden; 
            white-space: nowrap; flex-shrink: 0;
        }
        .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 60s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* STRUCTURE MAIN */
        #main-container { display: flex; flex-grow: 1; overflow: hidden; }

        /* --- DESKTOP --- */
        @media (min-width: 769px) {
            #main-container { flex-direction: row; }
            aside#sidebar { width: 350px; border-right: 1px solid #004411; height: 100%; }
            #map-container { flex-grow: 1; position: relative; }
        }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            #main-container { flex-direction: column; height: auto; overflow: visible; }
            aside#sidebar { width: 100%; height: auto; max-height: 50vh; border-bottom: 1px solid #004411; }
            #map-container { width: 100%; height: 50vh; position: relative; }
            
            /* Ajustement texte Mobile */
            .news-text { font-size: 12px !important; line-height: 1.4 !important; }
            .news-meta { font-size: 10px !important; }
            .filter-btns { width: 90% !important; flex-wrap: wrap; justify-content: center; }
            .filter-btns button { font-size: 9px !important; padding: 6px 8px !important; }
        }

        /* POPUPS & ALERTES */
        .emergency-border { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: 8px solid #ff0000; box-shadow: inset 0 0 50px #7f0000; z-index: 9999; pointer-events: none; animation: alert-flash 1s infinite; display: none; }
        @keyframes alert-flash { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }
        #critical-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(139, 0, 0, 0.95); border: 2px solid #ff0000; color: white; padding: 20px; z-index: 10000; display: none; text-align: center; width: 90%; box-shadow: 0 0 50px #000; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #004411; }
    </style>
</head>
<body>
    <div id="emergency-overlay" class="emergency-border"></div>
    <div id="critical-popup">
        <p class="text-[10px] uppercase tracking-widest mb-2 opacity-70">— ALERTE CRITIQUE —</p>
        <h2 id="popup-text" class="text-lg font-bold uppercase tracking-tighter leading-tight"></h2>
    </div>

    <header class="p-3 panel flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[10px] md:text-xs font-bold tracking-widest uppercase text-white">SITREP-ONE // LIVE</h1>
        </div>
        <div class="flex gap-4 items-center text-[9px]">
            <span id="update-time" class="opacity-50 text-green-500">SYNC: --:--</span>
            <a href="france.html" class="bg-blue-900 px-3 py-1 text-white font-bold uppercase hover:bg-blue-700 transition-colors">France</a>
        </div>
    </header>

    <div id="alert-zone" class="alert-bar uppercase">
        <div id="marquee-text" class="marquee-content">INITIALISATION DU FLUX...</div>
    </div>

    <div id="main-container">
        <aside id="sidebar" class="panel flex flex-col shrink-0 overflow-hidden">
            <div class="p-4 border-b border-green-900/30">
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-green-900/10 p-2 border border-green-900/30 text-center">
                        <p class="text-[8px] opacity-50 uppercase font-bold">Alertes NASA</p>
                        <p id="count-impacts" class="text-xl font-bold text-white">00</p>
                    </div>
                    <div class="bg-green-900/10 p-2 border border-green-900/30 text-center">
                        <p class="text-[8px] opacity-50 uppercase font-bold">Dernier Intel</p>
                        <p id="latest-time" class="text-xl font-bold text-white">--:--</p>
                    </div>
                </div>
            </div>
            <div class="p-2 bg-red-950/20 text-[10px] font-bold text-red-500 uppercase italic px-4 border-b border-red-900/20">Intel Stream</div>
            <div id="news-feed" class="flex-grow overflow-y-auto p-4 space-y-4"></div>
        </aside>

        <div id="map-container" class="flex-grow">
            <div class="filter-btns absolute top-4 left-1/2 -translate-x-1/2 z-[1001] flex gap-2 w-full justify-center">
                <button onclick="filterByCountry('ALL', [32, 53], 4)" class="bg-black/90 border border-green-900 px-3 py-2 text-[10px] font-bold text-green-400 uppercase">Global</button>
                <button onclick="filterByCountry('IRAN', [32.4, 53.6], 5)" class="bg-black/90 border border-red-900 px-3 py-2 text-[10px] font-bold text-red-500 uppercase">Iran</button>
                <button onclick="filterByCountry('ISRAËL', [31.5, 34.8], 7)" class="bg-black/90 border border-blue-900 px-3 py-2 text-[10px] font-bold text-blue-500 uppercase">Israël</button>
                <button onclick="filterByCountry('LIBAN', [33.8, 35.8], 8)" class="bg-black/90 border border-yellow-700 px-3 py-2 text-[10px] font-bold text-yellow-500 uppercase">Liban</button>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let allNewsData = [];
        let currentFilter = 'ALL';
        let lastUrgentId = null;

        function filterByCountry(country, coords, zoom) {
            currentFilter = country;
            map.flyTo(coords, zoom, { duration: 1.5 });
            updateNewsDisplay();
        }

        function updateNewsDisplay() {
            const feed = document.getElementById('news-feed');
            const filtered = allNewsData.filter(n => currentFilter === 'ALL' || n.text.includes(currentFilter));
            feed.innerHTML = filtered.map(n => `
                <div class="p-3 border-l-2 ${n.urgent ? 'bg-red-900/20 border-red-600' : 'bg-green-900/5 border-green-800'} mb-2">
                    <div class="flex justify-between news-meta text-[8px] opacity-60 mb-1 font-bold"><span>${n.source}</span><span>${n.time}</span></div>
                    <p class="text-white news-text text-[11px] leading-snug uppercase font-bold">${n.text}</p>
                </div>
            `).join('');
        }

        async function refreshData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                allNewsData = d.news || [];
                
                document.getElementById('update-time').innerText = "SYNC: " + d.last_update;
                document.getElementById('count-impacts').innerText = (d.impacts || []).length;
                if (allNewsData.length > 0) document.getElementById('latest-time').innerText = allNewsData[0].time;

                const urgentNews = allNewsData.filter(n => n.urgent);
                if(urgentNews.length > 0 && urgentNews[0].id !== lastUrgentId) {
                    lastUrgentId = urgentNews[0].id;
                    document.getElementById('emergency-overlay').style.display = 'block';
                    document.getElementById('critical-popup').style.display = 'block';
                    document.getElementById('popup-text').innerText = urgentNews[0].text;
                    setTimeout(() => {
                        document.getElementById('emergency-overlay').style.display = 'none';
                        document.getElementById('critical-popup').style.display = 'none';
                    }, 7000);
                }

                document.getElementById('marquee-text').innerText = urgentNews.length > 0 ? urgentNews.slice(0, 3).map(n => ` [ ${n.time} ] ${n.text} `).join(' /// ') : "VEILLE ACTIVE /// " + d.last_update;
                updateNewsDisplay();
            } catch(e) { console.error(e); }
        }

        setInterval(refreshData, 30000);
        refreshData();
        window.addEventListener('resize', () => { map.invalidateSize(); });
    </script>
</body>
</html>
