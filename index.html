<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITREP-ONE | DEFCON MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --neon-green: #00ff66;
            --neon-red: #ff003c;
            --terminal-bg: #0a0a0c;
        }

        body { 
            background: var(--terminal-bg); 
            color: var(--neon-green); 
            font-family: 'JetBrains Mono', monospace; 
            overflow: hidden; 
            height: 100vh; 
        }

        h1 { font-family: 'Orbitron', sans-serif; }

        .tactical-panel { 
            background: rgba(15, 15, 20, 0.9); 
            border: 1px solid rgba(0, 255, 102, 0.2);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Scanline & Grain d'écran */
        .screen-fx {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        repeating-linear-gradient(0deg, transparent 0, rgba(0, 255, 102, 0.03) 1px, transparent 2px);
            background-size: 100% 4px, 100% 2px;
            pointer-events: none; z-index: 1000;
        }

        #map { 
            height: 100%; width: 100%; 
            background: #050505 !important;
        }

        /* Animation des impacts */
        .impact-marker {
            animation: impact-ping 1.5s infinite;
            border: 2px solid white;
            border-radius: 50%;
            background: var(--neon-red);
        }

        @keyframes impact-ping {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 60, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 0, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 60, 0); }
        }

        .cmd-btn {
            background: rgba(0, 255, 102, 0.05);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-size: 10px;
            padding: 5px 12px;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            transition: 0.3s;
            cursor: pointer;
        }

        .cmd-btn:hover { background: var(--neon-green); color: black; }
        
        /* Marquee Alert */
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 25s linear infinite; }
    </style>
</head>
<body class="flex flex-col p-3 gap-3">

    <div class="bg-red-900/30 text-red-500 text-[10px] py-1 overflow-hidden whitespace-nowrap border border-red-900/50">
        <div class="animate-marquee px-4">
            ALERTE : SURVEILLANCE SATELLITE VIIRS SNPP ACTIVE // DÉTECTION THERMIQUE EN TEMPS RÉEL // ANALYSE GÉOPOLITIQUE MOYEN-ORIENT // UNITÉ OSINT SITREP-ONE
        </div>
    </div>

    <header class="flex justify-between items-center px-4 py-2 tactical-panel border-b-2 border-green-500/50">
        <div class="flex items-center gap-4">
            <div class="w-3 h-3 bg-red-600 rounded-full shadow-[0_0_10px_red] animate-pulse"></div>
            <h1 class="text-sm tracking-[0.4em] uppercase font-bold">SITREP-ONE // SATELLITE_FEED</h1>
        </div>
        <div class="flex gap-6 items-center">
            <div class="text-right">
                <span class="text-[9px] block opacity-60 uppercase">Impacts 24h</span>
                <span id="threat-count" class="text-xl font-bold text-red-500 font-mono">00</span>
            </div>
            <div class="h-8 w-[1px] bg-green-900"></div>
            <a href="france.html" class="cmd-btn border-blue-500 text-blue-400">UNITÉ FRANCE 🇫🇷</a>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-3 flex-grow overflow-hidden">
        
        <aside class="col-span-3 tactical-panel flex flex-col overflow-hidden">
            <div class="p-3 bg-green-500/10 border-b border-green-500/20 flex justify-between">
                <span class="text-[10px] font-bold">INTEL_LOG</span>
                <span class="text-[10px] opacity-50">SYNC: LIVE</span>
            </div>
            <div id="intel-feed" class="p-3 space-y-4 overflow-y-auto flex-grow">
                </div>
        </aside>

        <section class="col-span-9 tactical-panel overflow-hidden group">
            <div class="screen-fx"></div>
            <div id="map"></div>
            
            <div class="absolute top-4 right-4 z-[1001] flex gap-2">
                <button onclick="map.setView([32.42, 53.68], 5)" class="cmd-btn">IRAN</button>
                <button onclick="map.setView([31.04, 34.85], 8)" class="cmd-btn">ISRAËL</button>
                <button onclick="map.setView([32.0, 45.0], 4)" class="cmd-btn">RESET VIEW</button>
            </div>

            <div class="absolute bottom-4 left-4 z-[1001] bg-black/80 p-2 border border-green-500/30 text-[9px] font-mono">
                COORD: <span id="coords">0.00, 0.00</span>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialisation SANS FlyTo automatique
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([32.0, 45.0], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let lastHash = "";

        async function syncMonitor() {
            try {
                const response = await fetch('data.json?u=' + Date.now());
                const data = await response.json();
                
                // On vérifie si les données ont changé pour ne pas rafraîchir inutilement
                const currentHash = JSON.stringify(data);
                if (currentHash === lastHash) return;
                lastHash = currentHash;

                document.getElementById('threat-count').innerText = data.length.toString().padStart(2, '0');
                
                const feed = document.getElementById('intel-feed');
                feed.innerHTML = '';
                
                // On ne vide que les marqueurs
                map.eachLayer(layer => { if(layer instanceof L.CircleMarker) map.removeLayer(layer); });

                data.reverse().forEach(ev => {
                    feed.innerHTML += `
                        <div class="p-3 border-l-2 border-red-500 bg-red-500/5 mb-2 transition-all">
                            <div class="flex justify-between text-[8px] text-red-400 mb-1 font-bold">
                                <span>${ev.time} UTC</span>
                                <span>KINETIC_HIT</span>
                            </div>
                            <div class="text-[10px] text-white font-bold uppercase tracking-tight">${ev.title}</div>
                            <div class="text-[8px] text-green-700 mt-1 font-mono">${ev.lat}, ${ev.lng}</div>
                        </div>
                    `;

                    L.circleMarker([ev.lat, ev.lng], {
                        radius: 7,
                        color: '#ff003c',
                        fillColor: '#ff003c',
                        fillOpacity: 0.8,
                        className: 'impact-marker'
                    }).addTo(map);
                });
            } catch (e) { console.log("Lien satellite en attente..."); }
        }

        map.on('mousemove', e => {
            document.getElementById('coords').innerText = `${e.latlng.lat.toFixed(2)}, ${e.latlng.lng.toFixed(2)}`;
        });

        // Update toutes les 15 secondes sans toucher à la vue utilisateur
        setInterval(syncMonitor, 15000);
        syncMonitor();
    </script>
</body>
</html>
