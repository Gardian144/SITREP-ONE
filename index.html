<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITREP-ONE | COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #030303; color: #e0e0e0; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .bento-card { background: rgba(10, 10, 10, 0.95); border: 1px solid #1a1a1a; position: relative; }
        #map { height: 100%; width: 100%; filter: brightness(0.5) contrast(1.4) grayscale(0.8) invert(0.05); }
        
        /* Effet Secousse (Shake) */
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 40% { transform: translate(3px, 2px) rotate(-1deg); } 100% { transform: translate(0,0); } }
        .shake-effect { animation: shake 0.5s; }

        .flash-red { animation: flash 0.8s ease-out; }
        @keyframes flash { 0% { box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.5); } 100% { box-shadow: inset 0 0 0 rgba(255, 0, 0, 0); } }
        
        .pulse-icon { border-radius: 50%; animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.8); } 100% { box-shadow: 0 0 0 30px rgba(255, 68, 68, 0); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="h-screen flex flex-col p-2 gap-2" id="main-body">

    <header class="flex justify-between items-center px-2 py-1 border-b border-zinc-900">
        <div class="flex items-center gap-3">
            <div class="h-2 w-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-lg font-black tracking-widest text-zinc-200 uppercase">SITREP-ONE // TACTICAL_INTERFACE</h1>
        </div>
        <div class="flex gap-4 items-center">
            <div id="sync-status" class="text-[9px] text-zinc-500 uppercase tracking-widest">Link: Stable</div>
            <button onclick="document.documentElement.requestFullscreen()" class="text-[9px] border border-zinc-700 px-2 py-1 hover:bg-white hover:text-black transition uppercase">Go Fullscreen</button>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-2 flex-grow overflow-hidden">
        <section class="col-span-3 bento-card flex flex-col border-r border-zinc-800">
            <div class="p-2 text-[10px] font-bold bg-zinc-900/50 text-zinc-400 flex justify-between">
                <span>INTEL_STREAM</span>
                <span id="event-count">0 UNITS</span>
            </div>
            <div class="p-3 space-y-3 overflow-y-auto" id="news-feed"></div>
        </section>

        <section class="col-span-9 bento-card overflow-hidden">
            <div id="map"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([32.42, 53.68], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); // Style plus léger pour le chargement

        let lastCount = 0;
        const alertSnd = new Audio('https://www.soundjay.com/buttons/sounds/beep-22.mp3');

        async function refresh() {
            try {
                const res = await fetch('data.json?update=' + Date.now());
                const data = await res.json();

                if (data.length > lastCount && lastCount !== 0) {
                    document.getElementById('main-body').classList.add('flash-red', 'shake-effect');
                    alertSnd.play().catch(() => {});
                    setTimeout(() => document.getElementById('main-body').classList.remove('flash-red', 'shake-effect'), 800);
                }
                lastCount = data.length;
                document.getElementById('event-count').innerText = data.length + " UNITS";

                const feed = document.getElementById('news-feed');
                feed.innerHTML = '';
                data.reverse().forEach(ev => {
                    const color = (ev.type === 'STRIKE' || ev.type === 'FIRE') ? 'red' : 'blue';
                    feed.innerHTML += `
                        <div class="p-2 border border-zinc-800 bg-black mb-2">
                            <div class="flex justify-between text-[8px] mb-1 text-zinc-500">
                                <span>${ev.time} UTC</span>
                                <span class="text-${color}-500 font-bold">${ev.type}</span>
                            </div>
                            <div class="text-xs font-bold text-zinc-100 uppercase">${ev.title}</div>
                            <div class="text-[10px] text-zinc-500 mt-1">${ev.desc}</div>
                        </div>
                    `;
                    L.circleMarker([ev.lat, ev.lng], { color: color==='red'?'#ff3333':'#3388ff', radius: 8, className: 'pulse-icon' }).addTo(map);
                });
            } catch (e) { console.log("System Sync..."); }
        }

        setInterval(refresh, 5000);
        refresh();
    </script>
</body>
</html>
