<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // ULTIMATE COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --main-color: #00ff66; --bg-panel: rgba(0, 10, 0, 0.95); --border-color: #004411; --alert-red: #ff0000; }
        .stealth-mode { --main-color: #ffaa00; --border-color: #442200; --bg-panel: rgba(15, 10, 0, 0.95); }

        body { background: #000; color: var(--main-color); font-family: 'JetBrains Mono'; margin: 0; height: 100vh; display: flex; flex-direction: column; transition: all 0.5s ease; }
        #main-container { display: flex; flex-grow: 1; overflow: hidden; }
        aside#sidebar { width: 320px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; background: var(--bg-panel); }
        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #000; }

        /* HEATMAP ET TRAJECTOIRES */
        .heat-zone { fill: #ff0000; fill-opacity: 0.3; stroke: none; animation: pulse-heat 3s infinite ease-in-out; pointer-events: none; }
        @keyframes pulse-heat { 0%, 100% { fill-opacity: 0.2; transform: scale(1); } 50% { fill-opacity: 0.5; transform: scale(1.1); } }
        .arc-path { stroke-dasharray: 10, 10; animation: flow 30s linear infinite; stroke: rgba(255,255,255,0.4); fill: none; }
        @keyframes flow { to { stroke-dashoffset: -500; } }

        /* UI ELEMENTS */
        .panel-header { border-bottom: 1px solid var(--border-color); padding: 10px; }
        .btn-action { background: rgba(0,0,0,0.6); border: 1px solid var(--border-color); color: var(--main-color); padding: 5px 10px; font-size: 9px; cursor: pointer; text-transform: uppercase; }
        .btn-action:hover { background: var(--main-color); color: #000; }
        
        #news-feed div { border-left: 2px solid var(--border-color); padding: 8px; margin-bottom: 8px; font-size: 11px; }
        #news-feed .urgent { border-left-color: var(--alert-red); background: rgba(255,0,0,0.05); }

        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            aside#sidebar { width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid var(--border-color); }
            #map-container { height: 55vh; }
        }
    </style>
</head>
<body id="app-body">
    <header class="p-3 border-b border-green-900/30 flex justify-between items-center bg-black">
        <div class="flex items-center gap-3">
            <div id="status-light" class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[10px] font-bold tracking-tighter uppercase text-white">SITREP-ONE // STRATCOM</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleStealth()" class="btn-action">Stealth</button>
            <a href="france.html" class="btn-action" style="background: #1d4ed8; color: white; border: none;">Unit_FR</a>
        </div>
    </header>

    <div id="main-container">
        <aside id="sidebar">
            <div class="panel-header">
                <input type="text" id="search-bar" placeholder="RECHERCHE TACTIQUE..." class="w-full bg-black/50 border border-green-900 p-2 text-[10px] text-green-400 outline-none mb-2">
                <div class="grid grid-cols-2 gap-2 text-center text-[9px] font-bold">
                    <div class="bg-black border border-green-900 p-1">NASA: <span id="nasa-val">0</span></div>
                    <div class="bg-black border border-green-900 p-1">SYNC: <span id="sync-val">--</span></div>
                </div>
            </div>
            <div id="news-feed" class="flex-grow overflow-y-auto p-3"></div>
            <div id="terminal" class="bg-black text-[7px] p-2 opacity-50 font-mono h-16 overflow-hidden"></div>
            <a href="archives.html" class="p-2 text-center text-[9px] opacity-70 border-t border-green-900">SYSTEM_ARCHIVES</a>
        </aside>

        <div id="map-container">
            <div class="absolute top-4 left-0 right-0 z-[1000] flex justify-center gap-2 px-4">
                <button onclick="changeMap('dark')" class="btn-action">Tactique</button>
                <button onclick="changeMap('pop')" class="btn-action">Population</button>
                <button onclick="changeMap('infra')" class="btn-action">Infrastructure</button>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- INITIALISATION CARTE ---
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        
        const layers = {
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'),
            pop: L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png'), // Proxy pour visuel civil
            infra: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png')
        };
        layers.dark.addTo(map);

        function changeMap(key) {
            Object.values(layers).forEach(l => map.removeLayer(l));
            layers[key].addTo(map);
            log(`MAP_LAYER_CHANGED: ${key.toUpperCase()}`);
        }

        // --- AUDIO TACTIQUE (Synthétique) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAlertSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // --- HEATMAP & TRAJECTOIRES ---
        function drawHeat(lat, lon, size) {
            L.circle([lat, lon], { radius: size * 1000, className: 'heat-zone' }).addTo(map);
        }

        // --- SYSTEM FUNCTIONS ---
        function log(msg) {
            const t = document.getElementById('terminal');
            t.innerHTML = `> ${msg}<br>` + t.innerHTML;
        }

        function toggleStealth() {
            document.getElementById('app-body').classList.toggle('stealth-mode');
            log("STEALTH_MODE_TOGGLED");
        }

        let newsData = [];
        async function loadData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                newsData = d.news;
                document.getElementById('sync-val').innerText = d.last_update;
                document.getElementById('nasa-val').innerText = d.impacts.length;
                
                // Detection alerte critique pour le son
                if(newsData.some(n => n.urgent)) {
                    playAlertSound();
                    log("CRITICAL_THREAT_DETECTED");
                }
                
                renderNews();
                // Simulation Heatmap sur les points d'impact
                d.impacts.forEach(imp => drawHeat(imp.lat, imp.lon, 40));
            } catch(e) { log("SYNC_ERROR_RETRYING"); }
        }

        function renderNews() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const feed = document.getElementById('news-feed');
            feed.innerHTML = newsData
                .filter(n => n.text.toLowerCase().includes(query))
                .map(n => `
                    <div class="${n.urgent ? 'urgent' : ''}">
                        <span class="opacity-50 text-[8px]">${n.time} | ${n.source}</span><br>
                        <b class="uppercase">${n.text}</b>
                    </div>
                `).join('');
        }

        document.getElementById('search-bar').addEventListener('input', renderNews);
        setInterval(loadData, 30000);
        loadData();
        log("STRATCOM_BOOT_SUCCESS");
    </script>
</body>
</html>
