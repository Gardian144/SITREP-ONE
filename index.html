<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --main-color: #00ff66; --border-color: #004411; --bg-panel: rgba(0, 10, 0, 0.95); }
        .stealth-mode { --main-color: #ffaa00; --border-color: #442200; }

        body { background: #000; color: var(--main-color); font-family: 'JetBrains Mono'; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #main-container { display: flex; flex-grow: 1; overflow: hidden; }
        aside#sidebar { width: 320px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; background: var(--bg-panel); flex-shrink: 0; }
        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #000 !important; }

        /* BANDEAU ALERTES */
        .alert-bar { background: #450a0a; border-bottom: 1px solid #ef4444; color: #fca5a5; padding: 6px 0; font-size: 11px; font-weight: bold; overflow: hidden; white-space: nowrap; flex-shrink: 0; }
        .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 80s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* HEATMAP */
        .heat-zone { fill: #ff0000; fill-opacity: 0.3; stroke: none; animation: pulse-heat 3s infinite ease-in-out; pointer-events: none; }
        @keyframes pulse-heat { 0%, 100% { fill-opacity: 0.2; transform: scale(1); } 50% { fill-opacity: 0.5; transform: scale(1.1); } }

        .btn-country { background: rgba(0,0,0,0.8); border: 1px solid var(--border-color); color: var(--main-color); padding: 6px 10px; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .btn-country:hover { background: var(--main-color); color: #000; }

        @media (max-width: 768px) {
            body { height: auto !important; overflow-y: auto !important; display: block !important; }
            #main-container { flex-direction: column !important; height: auto !important; }
            aside#sidebar { width: 100% !important; height: 45vh !important; border-right: none; border-bottom: 1px solid var(--border-color); }
            #map-container { height: 55vh !important; width: 100% !important; }
        }
    </style>
</head>
<body id="app-body">

    <div id="system-access-overlay" class="fixed inset-0 z-[10000] bg-black flex items-center justify-center flex-col transition-all duration-1000">
        <div class="border-2 border-green-600 p-8 bg-green-950/20 text-center space-y-4 max-w-md mx-4 shadow-[0_0_30px_rgba(0,255,102,0.2)]">
            <div class="w-12 h-12 border-4 border-green-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <h2 class="text-green-500 text-xl font-bold tracking-[0.2em] uppercase">Accès Restreint</h2>
            <p class="text-green-400 text-[10px] font-mono leading-relaxed opacity-80">
                ÉTABLISSEMENT DE LA LIAISON SÉCURISÉE...<br>
                SYNCHRONISATION DES FLUX TACTIQUES EN COURS.
            </p>
            <button onclick="unlockSystem()" class="mt-6 w-full bg-green-600 hover:bg-green-500 text-black font-bold py-3 px-6 text-xs uppercase tracking-widest transition-colors">
                Initialiser le Terminal
            </button>
        </div>
    </div>

    <header class="p-3 border-b border-green-900/30 flex justify-between items-center bg-black shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[10px] font-bold tracking-widest uppercase text-white">SITREP-ONE // LIVE</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleStealth()" class="text-[9px] border border-green-900 px-2 py-1 uppercase text-green-500">Stealth</button>
            <a href="france.html" class="bg-blue-700 px-3 py-1 text-white text-[9px] font-bold uppercase">Unit_FR</a>
        </div>
    </header>

    <div class="alert-bar uppercase font-mono">
        <div id="marquee-text" class="marquee-content text-red-100">INITIALISATION DES FLUX TACTIQUES...</div>
    </div>

    <div id="main-container">
        <aside id="sidebar">
            <div class="p-3 border-b border-green-900/20">
                <div class="grid grid-cols-2 gap-2 mb-3 text-center">
                    <div class="bg-black border border-green-900 p-2"><p class="text-[7px] opacity-50 uppercase">NASA Impacts</p><p id="nasa-val" class="text-lg font-bold">0</p></div>
                    <div class="bg-black border border-green-900 p-2"><p class="text-[7px] opacity-50 uppercase">Sync Status</p><p id="sync-val" class="text-lg font-bold">--:--</p></div>
                </div>
                <input type="text" id="search-bar" placeholder="RECHERCHE MOT-CLÉ..." class="w-full bg-black/50 border border-green-900 p-2 text-[10px] text-green-400 outline-none mb-1">
            </div>
            
            <div class="bg-red-950/40 text-[9px] font-bold text-red-500 uppercase px-4 py-1.5 border-b border-red-900/30 italic">Intel Stream</div>
            <div id="news-feed" class="flex-grow overflow-y-auto p-3 space-y-3"></div>

            <div id="terminal" class="bg-black text-[7px] p-2 opacity-40 font-mono h-12 overflow-hidden border-t border-green-900/20"></div>
            <a href="archives.html" class="p-2 text-center text-[9px] font-bold border-t border-green-900 hover:bg-green-900/10">ACCÉDER AUX ARCHIVES</a>
        </aside>

        <div id="map-container">
            <div class="absolute top-4 left-0 right-0 z-[1000] flex justify-center gap-1.5 px-2">
                <button onclick="filterByCountry('ALL', [32, 53], 4)" class="btn-country">Global</button>
                <button onclick="filterByCountry('IRAN', [32.4, 53.6], 5)" class="btn-country">Iran</button>
                <button onclick="filterByCountry('ISRAËL', [31.5, 34.8], 7)" class="btn-country">Israël</button>
                <button onclick="filterByCountry('LIBAN', [33.8, 35.8], 8)" class="btn-country">Liban</button>
                <button onclick="toggleMapLayer()" class="btn-country" id="map-mode-btn">Pop. OFF</button>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- LOGIQUE D'ACCÈS ---
        (function() {
            if (sessionStorage.getItem('terminal_unlocked') === 'true') {
                document.getElementById('system-access-overlay').style.display = 'none';
            }
        })();

        function unlockSystem() {
            playAlert(); 
            sessionStorage.setItem('terminal_unlocked', 'true');
            const overlay = document.getElementById('system-access-overlay');
            overlay.style.opacity = '0';
            overlay.style.filter = 'blur(10px)';
            setTimeout(() => { overlay.style.display = 'none'; }, 1000);
        }

        // --- LOGIQUE MAP ---
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const popLayer = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png');

        function toggleMapLayer() {
            const btn = document.getElementById('map-mode-btn');
            if (map.hasLayer(popLayer)) {
                map.removeLayer(popLayer);
                btn.innerText = "Pop. OFF";
            } else {
                popLayer.addTo(map);
                btn.innerText = "Pop. ON";
            }
        }

        function addTacticalGrid() {
            const style = { color: 'rgba(0, 255, 102, 0.08)', weight: 0.5, interactive: false };
            for (let i = -180; i <= 180; i += 15) { L.polyline([[-90, i], [90, i]], style).addTo(map); }
            for (let i = -90; i <= 90; i += 15) { L.polyline([[i, -180], [i, 180]], style).addTo(map); }
        }
        addTacticalGrid();

        // --- AUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAlert() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        // --- DATA & FILTERS ---
        let allNews = [];
        let currentFilter = 'ALL';

        function filterByCountry(c, coords, z) {
            currentFilter = c;
            map.flyTo(coords, z, {duration: 1.5});
            log(`FILTER_ACTIVE: ${c}`);
            updateDisplay();
        }

        function log(msg) {
            const t = document.getElementById('terminal');
            t.innerHTML = `> ${msg}<br>` + t.innerHTML;
        }

        function toggleStealth() {
            document.getElementById('app-body').classList.toggle('stealth-mode');
            log("STEALTH_MODE_TOGGLE");
        }

        async function loadData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                allNews = d.news;
                document.getElementById('sync-val').innerText = d.last_update;
                document.getElementById('nasa-val').innerText = d.impacts.length;

                d.impacts.forEach(imp => {
                    L.circle([imp.lat, imp.lon], { radius: 45000, className: 'heat-zone' }).addTo(map);
                });

                const urgent = allNews.filter(n => n.urgent);
                if(urgent.length > 0) {
                    playAlert();
                    document.getElementById('marquee-text').innerText = urgent.slice(0, 3).map(n => ` [ ${n.time} ] ${n.text} `).join(' /// ');
                } else {
                    document.getElementById('marquee-text').innerText = "GRID_VEILLE_ACTIVE /// SYSTÈME OPÉRATIONNEL /// " + d.last_update;
                }
                updateDisplay();
            } catch(e) { log("DATA_FETCH_ERROR"); }
        }

        function updateDisplay() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const feed = document.getElementById('news-feed');
            const filtered = allNews.filter(n => 
                (currentFilter === 'ALL' || n.text.includes(currentFilter)) && 
                (query === "" || n.text.toLowerCase().includes(query))
            );
            feed.innerHTML = filtered.map(n => `
                <div class="p-2 border-l-2 ${n.urgent ? 'bg-red-950/20 border-red-600' : 'bg-green-950/5 border-green-900'} text-[10px]">
                    <div class="flex justify-between text-[7px] opacity-60 mb-1 font-bold"><span>${n.source}</span><span>${n.time}</span></div>
                    <b class="uppercase leading-tight">${n.text}</b>
                </div>
            `).join('');
        }

        document.getElementById('search-bar').addEventListener('input', updateDisplay);
        setInterval(loadData, 30000);
        loadData();
        log("C2_SYSTEM_ONLINE");
    </script>
</body>
</html>
