<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #050505; color: #00ff66; font-family: 'JetBrains Mono'; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #map { height: 100%; background: #000 !important; }
        .panel { background: rgba(0, 10, 0, 0.9); border: 1px solid #004411; }
        
        /* ALERTE URGENCE (Mode Flash) */
        .emergency-mode { background: #1a0000; animation: flash 1s infinite; }
        @keyframes flash { 0% { box-shadow: inset 0 0 50px #f00; } 50% { box-shadow: inset 0 0 100px #400; } 100% { box-shadow: inset 0 0 50px #f00; } }
        
        /* BANDEAU DÉFILANT HAUT (Plus lent : 60s) */
        .marquee-container { background: #450a0a; border-bottom: 1px solid #ef4444; color: #fca5a5; overflow: hidden; height: 24px; display: flex; align-items: center; shrink-0; }
        .marquee-text { white-space: nowrap; display: inline-block; animation: marquee-slow 60s linear infinite; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        @keyframes marquee-slow { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #004411; }

        @media (max-width: 768px) {
            #main-container { flex-direction: column; overflow-y: auto; }
            aside { width: 100% !important; height: 350px !important; order: 2; }
            #map-container { height: 40vh; min-height: 300px; order: 1; }
        }
    </style>
</head>
<body class="flex flex-col">
    <header class="p-3 panel flex justify-between items-center shrink-0 border-b border-green-900/50">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[10px] md:text-xs font-bold tracking-widest uppercase text-white">SITREP-ONE // SYSTEM_ACTIVE</h1>
        </div>
        <div class="flex gap-4 items-center">
            <div id="threat-level" class="hidden md:flex items-center gap-2 px-2 border border-green-900 text-[9px]">
                <span class="opacity-50">THREAT_LEVEL:</span> <span id="threat-val" class="font-bold">ANALYSING...</span>
            </div>
            <span id="update-time" class="text-[9px] md:text-[10px] opacity-50 font-bold font-mono">SYNC: --:--</span>
            <a href="france.html" class="bg-blue-900 hover:bg-blue-700 px-3 py-1 text-[9px] md:text-[10px] text-white font-bold transition-all">SITREP FRANCE</a>
        </div>
    </header>

    <div class="marquee-container">
        <div id="marquee-content" class="marquee-text">
            INITIALISATION DU FLUX D'ALERTE... SCAN SATELLITE EN COURS... ANALYSE DES RISQUES GÉOPOLITIQUES...
        </div>
    </div>

    <div id="main-container" class="relative flex flex-grow overflow-hidden">
        <aside class="w-80 panel p-4 z-[1000] flex flex-col shrink-0 border-r border-green-900/30">
            <div class="grid grid-cols-2 gap-2 mb-4 border-b border-green-900/30 pb-4 text-[9px]">
                <div class="bg-green-900/10 p-2 border border-green-900/30">
                    <p class="opacity-50 uppercase">Alertes_NASA</p>
                    <p id="count-impacts" class="text-xl font-bold text-white">00</p>
                </div>
                <div class="bg-green-900/10 p-2 border border-green-900/30">
                    <p class="opacity-50 uppercase">Dernière_MAJ</p>
                    <p id="latest-time" class="text-xl font-bold text-white">--:--</p>
                </div>
            </div>

            <h2 class="text-[10px] font-bold text-red-500 mb-2 uppercase tracking-tighter">Flux Intel (Priorisé)</h2>
            <div id="news-feed" class="space-y-3 overflow-y-auto flex-grow pr-2">
                </div>
        </aside>

        <div id="map-container" class="flex-grow">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([25, 45], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function refreshData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                
                document.getElementById('update-time').innerText = "SYNC: " + d.last_update;
                document.getElementById('count-impacts').innerText = d.impacts ? d.impacts.length.toString().padStart(2, '0') : '00';
                
                // Calcul Niveau de Menace
                const threat = d.impacts.length > 15 ? "CRITICAL" : (d.impacts.length > 5 ? "ELEVATED" : "STABLE");
                const threatEl = document.getElementById('threat-val');
                threatEl.innerText = threat;
                threatEl.className = `font-bold ${threat === "CRITICAL" ? "text-red-600 animate-pulse" : (threat === "ELEVATED" ? "text-yellow-500" : "text-green-500")}`;

                if(d.emergency) document.body.classList.add('emergency-mode');
                else document.body.classList.remove('emergency-mode');

                // TRI HYBRIDE : ROUGE d'abord (heure décroissante), puis VERT (heure décroissante)
                const urgentNews = d.news.filter(n => n.urgent).sort((a,b) => b.time.localeCompare(a.time));
                const normalNews = d.news.filter(n => !n.urgent).sort((a,b) => b.time.localeCompare(a.time));
                const allSorted = [...urgentNews, ...normalNews];

                if(allSorted.length > 0) document.getElementById('latest-time').innerText = allSorted[0].time;

                const feed = document.getElementById('news-feed');
                feed.innerHTML = allSorted.map(n => `
                    <div class="p-3 border-l-4 ${n.urgent ? 'bg-red-900/30 border-red-600 animate-pulse' : 'bg-green-900/5 border-green-900/40'} text-[10px] mb-2">
                        <div class="flex justify-between items-center mb-1">
                            <span class="${n.urgent ? 'text-red-500 font-bold' : 'text-green-600'} font-bold">
                                [${n.urgent ? 'ALPHA_PRIORITY' : 'INTEL_DATA'}]
                            </span>
                            <span class="text-[8px] opacity-60 text-white font-mono">${n.time}</span>
                        </div>
                        <span class="text-white/90 leading-tight block">${n.text}</span>
                    </div>
                `).join('');

                // Mise à jour du bandeau défilant (Marquee) avec les news urgentes
                const marqueeText = urgentNews.length > 0 
                    ? "ALERTE CRITIQUE : " + urgentNews.map(n => n.text).join(' /// ') 
                    : "SITUATION GLOBALE SOUS SURVEILLANCE... AUCUNE ALERTE MAJEURE IMMÉDIATE...";
                document.getElementById('marquee-content').innerText = marqueeText;

                // Mise à jour Carte
                map.eachLayer(l => { if(l instanceof L.CircleMarker) map.removeLayer(l); });
                d.impacts.forEach(a => { 
                    L.circleMarker([parseFloat(a.lat), parseFloat(a.lng)], {
                        radius: 7, color: 'red', fillColor: '#f00', fillOpacity: 0.8, weight: 2
                    }).addTo(map).bindTooltip("IMPACT NASA @ " + a.time); 
                });
                d.france.forces.forEach(u => {
                    L.circleMarker(u.p, { radius: 5, color: '#0088ff', fillOpacity: 0.7 }).addTo(map);
                });

            } catch(e) { console.error("Sync Error"); }
        }
        setInterval(refreshData, 30000); refreshData();
    </script>
</body>
</html>
