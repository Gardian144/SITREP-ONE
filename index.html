<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITREP-ONE // GLOBAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #050505; color: #00ff66; font-family: 'JetBrains Mono'; overflow: hidden; height: 100vh; transition: 0.5s; }
        body.emergency { background: #1a0000; animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { box-shadow: inset 0 0 50px #f00; } 50% { box-shadow: inset 0 0 100px #300; } }
        #map { height: 100%; background: #000 !important; }
        .panel { background: rgba(0, 10, 0, 0.9); border: 1px solid #004411; }
        .animate-marquee { display: inline-block; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body class="flex flex-col">
    <audio id="alarm-snd" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

    <div class="bg-red-900/20 py-1 border-b border-red-900 overflow-hidden whitespace-nowrap">
        <div id="ticker" class="animate-marquee text-[10px] uppercase font-bold text-red-500">SYNCHRONISATION SATELLITE EN COURS...</div>
    </div>

    <header class="p-3 panel flex justify-between items-center border-t-0">
        <h1 class="font-bold text-xs tracking-widest">SITREP-ONE // OPS_CENTER</h1>
        <div class="flex gap-4 items-center">
            <span id="threats" class="text-red-500 font-bold">00 IMPACTS</span>
            <a href="france.html" class="bg-blue-900 border border-blue-400 px-3 py-1 text-[10px] text-white">UNITÉ FRANCE</a>
        </div>
    </header>

    <div class="flex-grow flex relative">
        <aside class="w-72 panel p-4 z-[1000] hidden md:block">
            <h2 class="text-[10px] font-bold border-b border-green-900 mb-2">INTEL_STREAM</h2>
            <div id="feed" class="space-y-2 overflow-y-auto h-full text-[9px]"></div>
        </aside>
        <div id="map" class="flex-grow"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([25, 45], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function update() {
            const res = await fetch('data.json?v=' + Date.now());
            const d = await res.json();
            
            if(d.emergency) { 
                document.body.classList.add('emergency');
                document.getElementById('alarm-snd').play().catch(()=>{});
            } else { document.body.classList.remove('emergency'); }

            document.getElementById('ticker').innerText = d.news.join(' /// ');
            document.getElementById('threats').innerText = d.alerts.length + " IMPACTS";
            
            const feed = document.getElementById('feed'); feed.innerHTML = '';
            map.eachLayer(l => { if(l instanceof L.CircleMarker) map.removeLayer(l); });

            d.alerts.forEach(a => {
                feed.innerHTML += `<div class="p-2 bg-red-900/10 border-l-2 border-red-600">IMPACT @ ${a.t}</div>`;
                L.circleMarker([a.lat, a.lng], {radius: 5, color: 'red', fillOpacity: 0.7}).addTo(map);
            });
        }
        setInterval(update, 15000); update();
    </script>
</body>
</html>
