<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { background: #050505; color: #00ff66; font-family: 'JetBrains Mono'; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #map { height: 100%; background: #000 !important; width: 100%; }
        .panel { background: rgba(0, 10, 0, 0.9); border: 1px solid #004411; }

        .alert-bar { 
            background: #450a0a; border-bottom: 1px solid #ef4444; color: #fca5a5; 
            padding: 8px 0; font-size: 12px; font-weight: bold; overflow: hidden; 
            white-space: nowrap; display: flex; align-items: center;
        }

        .marquee-content {
            display: inline-block; padding-left: 100%;
            animation: scroll-left 120s linear infinite; 
        }

        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* MODE ALERTE ROUGE */
        .emergency-border {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            border: 8px solid #ff0000; box-shadow: inset 0 0 50px #7f0000;
            z-index: 9999; pointer-events: none; animation: alert-flash 1s infinite; display: none;
        }
        @keyframes alert-flash { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }

        .shake { animation: shake-anim 0.3s ease-in-out infinite; }
        @keyframes shake-anim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(3px); } 75% { transform: translateX(-3px); } }

        /* POPUP TACTIQUE */
        #critical-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(139, 0, 0, 0.95); border: 2px solid #ff0000; color: white;
            padding: 20px; z-index: 10000; display: none; text-align: center;
            box-shadow: 0 0 100px rgba(255, 0, 0, 0.5); width: 85%;
        }

        .pulse-icon {
            background: rgba(255, 0, 0, 0.5); border: 2px solid #ff0000; border-radius: 50%;
            box-shadow: 0 0 15px #ff0000; animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        /* --- ADAPTATION MOBILE STRICTE --- */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            #main-container { flex-direction: column !important; height: auto !important; overflow: visible !important; }
            
            #map-container { height: 45vh !important; order: 1; position: relative; flex-shrink: 0; }
            #sidebar { 
                width: 100% !important; 
                height: auto !important; 
                order: 2; 
                border-right: none !important; 
                border-top: 2px solid #004411; 
                padding-bottom: 30px;
                overflow: visible !important;
            }
            #news-feed { max-height: 500px; overflow-y: auto; }
            .absolute.top-4 { top: 10px !important; width: 90%; gap: 5px; }
            .absolute.top-4 button { font-size: 7px !important; padding: 5px !important; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #004411; }
    </style>
</head>
<body class="flex flex-col">
    <div id="emergency-overlay" class="emergency-border"></div>
    <div id="critical-popup">
        <p class="text-[10px] uppercase tracking-widest mb-2 opacity-70">— ALERTE CRITIQUE ENTRANTE —</p>
        <h2 id="popup-text" class="text-xl font-bold uppercase tracking-tighter"></h2>
    </div>

    <header class="p-3 panel flex justify-between items-center shrink-0 border-b border-green-900/50">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[10px] md:text-xs font-bold tracking-widest uppercase text-white">SITREP-ONE // LIVE</h1>
        </div>
        <div class="flex gap-4 items-center text-[9px]">
            <span id="update-time" class="opacity-50 font-mono text-green-500">SYNC: --:--</span>
            <a href="france.html" class="bg-blue-900 px-3 py-1 text-white font-bold uppercase">France</a>
        </div>
    </header>

    <div id="alert-zone" class="alert-bar tracking-[0.2em] uppercase">
        <div id="marquee-text" class="marquee-content">SYNCHRONISATION SYSTÈME...</div>
    </div>

    <div id="main-container" class="relative flex flex-grow overflow-hidden">
        <div class="absolute top-4 left-1/2 -translate-x-1/2 z-[1001] flex gap-2">
            <button onclick="filterByCountry('ALL', [32, 53], 4)" class="bg-black/90 border border-green-900 px-4 py-2 text-[10px] font-bold text-green-400 uppercase">Global</button>
            <button onclick="filterByCountry('IRAN', [32.4, 53.6], 5)" class="bg-black/90 border border-red-900 px-4 py-2 text-[10px] font-bold text-red-500 uppercase">Iran</button>
            <button onclick="filterByCountry('ISRAËL', [31.5, 34.8], 7)" class="bg-black/90 border border-blue-900 px-4 py-2 text-[10px] font-bold text-blue-500 uppercase">Israël</button>
            <button onclick="filterByCountry('LIBAN', [33.8, 35.8], 8)" class="bg-black/90 border border-yellow-700 px-4 py-2 text-[10px] font-bold text-yellow-500 uppercase">Liban</button>
        </div>

        <aside id="sidebar" class="w-80 panel p-4 z-[1000] flex flex-col shrink-0 border-r border-green-900/30 transition-all">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <div class="bg-green-900/10 p-2 border border-green-900/30 text-center">
                    <p class="text-[8px] opacity-50 uppercase font-bold">Alertes NASA</p>
                    <p id="count-impacts" class="text-xl font-bold text-white">00</p>
                </div>
                <div class="bg-green-900/10 p-2 border border-green-900/30 text-center">
                    <p class="text-[8px] opacity-50 uppercase font-bold">Dernier Intel</p>
                    <p id="latest-time" class="text-xl font-bold text-white">--:--</p>
                </div>
            </div>
            <h2 class="text-[10px] font-bold text-red-500 mb-2 uppercase border-b border-red-900/40 pb-1 italic">Flux de Renseignement</h2>
            <div id="news-feed" class="space-y-3 overflow-y-auto flex-grow pr-2 font-bold"></div>
            <a href="archives.html" class="mt-4 block text-center border border-green-900 py-2 text-[9px] uppercase text-green-400 font-bold">Archives</a>
        </aside>

        <div id="map-container" class="flex-grow">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let allNewsData = [];
        let currentFilter = 'ALL';
        let alertMarkers = L.layerGroup().addTo(map);
        let lastUrgentId = null;

        function filterByCountry(country, coords, zoom) {
            currentFilter = country;
            map.flyTo(coords, zoom, { duration: 1.5 });
            updateNewsDisplay();
        }

        function updateNewsDisplay() {
            const feed = document.getElementById('news-feed');
            alertMarkers.clearLayers();
            const filtered = allNewsData.filter(n => currentFilter === 'ALL' || n.text.includes(currentFilter));
            feed.innerHTML = filtered.map(n => `
                <div class="p-3 border-l-2 ${n.urgent ? 'bg-red-900/20 border-red-600' : 'bg-green-900/5 border-green-800'} text-[10px] mb-2">
                    <div class="flex justify-between text-[8px] opacity-60 mb-1 font-bold"><span>${n.source} // ${n.date}</span><span>${n.time}</span></div>
                    <p class="text-white leading-tight uppercase font-bold">${n.text}</p>
                </div>
            `).join('');
            if (currentFilter !== 'ALL' && filtered.some(n => n.urgent)) {
                L.marker(map.getCenter(), { icon: L.divIcon({ className: 'pulse-icon', iconSize: [20, 20] }) }).addTo(alertMarkers);
            }
        }

        async function refreshData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                allNewsData = d.news || [];
                
                document.getElementById('update-time').innerText = "SYNC: " + d.last_update;
                document.getElementById('count-impacts').innerText = (d.impacts || []).length;
                
                if (allNewsData.length > 0) {
                    const latestTimeDisplay = document.getElementById('latest-time');
                    latestTimeDisplay.innerText = allNewsData[0].time;
                    latestTimeDisplay.style.color = allNewsData[0].urgent ? "#ff4444" : "#ffffff";
                }

                const urgentNews = allNewsData.filter(n => n.urgent);
                const overlay = document.getElementById('emergency-overlay');
                const sidebar = document.getElementById('sidebar');
                const popup = document.getElementById('critical-popup');

                if(urgentNews.length > 0 && urgentNews[0].id !== lastUrgentId) {
                    lastUrgentId = urgentNews[0].id;
                    overlay.style.display = 'block';
                    sidebar.classList.add('shake');
                    popup.style.display = 'block';
                    document.getElementById('popup-text').innerText = urgentNews[0].text;

                    setTimeout(() => {
                        overlay.style.display = 'none';
                        sidebar.classList.remove('shake');
                        popup.style.display = 'none';
                    }, 7000);
                }

                const marqueeElement = document.getElementById('marquee-text');
                const topThree = urgentNews.slice(0, 3);
                marqueeElement.innerText = topThree.length > 0 ? topThree.map(n => ` [ ${n.time} ] ${n.text} `).join(' /// ') : "VEILLE RADAR ACTIVE /// " + d.last_update;

                updateNewsDisplay();
            } catch(e) { console.error("Data error", e); }
        }
        setInterval(refreshData, 30000); refreshData();
    </script>
</body>
</html>
