<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { background: #050505; color: #00ff66; font-family: 'JetBrains Mono'; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #main-container { display: flex; flex-direction: row; flex-grow: 1; overflow: hidden; }
        aside#sidebar { width: 320px; flex-shrink: 0; border-right: 1px solid #004411; display: flex; flex-direction: column; overflow: hidden; }
        #map-container { flex-grow: 1; position: relative; height: 100%; overflow: hidden; }
        #map { height: 100%; width: 100%; background: #000 !important; }

        /* MODE MOBILE */
        @media (max-width: 768px) {
            body { height: auto !important; overflow-y: auto !important; display: block !important; }
            #main-container { display: flex !important; flex-direction: column !important; height: auto !important; }
            aside#sidebar { width: 100% !important; height: 45vh !important; border-right: none !important; border-bottom: 1px solid #004411 !important; }
            #map-container { width: 100% !important; height: 55vh !important; }
        }

        .panel { background: rgba(0, 5, 0, 0.95); border: 1px solid #004411; }
        .alert-bar { background: #450a0a; border-bottom: 1px solid #ef4444; color: #fca5a5; padding: 6px 0; font-size: 12px; font-weight: bold; overflow: hidden; white-space: nowrap; flex-shrink: 0; }
        .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 100s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* ALERTES */
        .emergency-border { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: 6px solid #ff0000; box-shadow: inset 0 0 40px #7f0000; z-index: 9999; pointer-events: none; animation: alert-flash 1s infinite; display: none; }
        @keyframes alert-flash { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.5; } }
        #critical-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(139, 0, 0, 0.95); border: 2px solid #ff0000; color: white; padding: 20px; z-index: 10000; display: none; text-align: center; width: 85%; box-shadow: 0 0 50px #000; }
        
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #006622; }
    </style>
</head>
<body>
    <div id="emergency-overlay" class="emergency-border"></div>
    <div id="critical-popup"><h2 id="popup-text" class="text-lg font-bold uppercase tracking-tighter"></h2></div>

    <header class="p-3 panel flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[10px] md:text-xs font-bold tracking-widest uppercase text-white">SITREP-ONE // LIVE</h1>
        </div>
        <div class="flex gap-4 items-center">
            <span id="update-time" class="text-[9px] opacity-50 text-green-500">SYNC: --:--</span>
            <a href="france.html" class="bg-blue-700 px-5 py-2 text-white text-[11px] font-bold uppercase transition-all hover:bg-blue-600 shadow-lg shadow-blue-900/20">Unité France</a>
        </div>
    </header>

    <div class="alert-bar uppercase font-mono">
        <div id="marquee-text" class="marquee-content text-red-200">CHARGEMENT DU FLUX TACTIQUE...</div>
    </div>

    <div id="main-container">
        <aside id="sidebar" class="panel flex flex-col">
            <div class="p-3 border-b border-green-900/20">
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-green-950/30 p-2 border border-green-900/30 text-center">
                        <p class="text-[8px] opacity-60 uppercase font-bold text-green-400">NASA ALERTS</p>
                        <p id="count-impacts" class="text-xl font-bold text-white">00</p>
                    </div>
                    <div class="bg-green-950/30 p-2 border border-green-900/30 text-center">
                        <p class="text-[8px] opacity-60 uppercase font-bold text-green-400">LAST INTEL</p>
                        <p id="latest-time" class="text-xl font-bold text-white">--:--</p>
                    </div>
                </div>
            </div>
            
            <div class="bg-red-950/40 text-[10px] font-bold text-red-500 uppercase italic px-4 py-1.5 border-b border-red-900/30 tracking-widest">
                Intel Stream
            </div>

            <div id="news-feed" class="flex-grow overflow-y-auto p-3 space-y-3"></div>

            <a href="archives.html" class="p-3 text-center border-t border-green-900/40 text-[9px] uppercase font-bold text-green-500 hover:bg-green-900/10 transition-all bg-black/50">
                Accéder aux archives complètes
            </a>
        </aside>

        <div id="map-container">
            <div class="filter-btns absolute top-4 left-0 right-0 z-[1001] flex gap-2 justify-center px-2">
                <button onclick="filterByCountry('ALL', [32, 53], 4)" class="bg-black/90 border border-green-900 text-green-400 px-3 py-2 text-[9px] font-bold uppercase hover:bg-green-900/40">Global</button>
                <button onclick="filterByCountry('IRAN', [32.4, 53.6], 5)" class="bg-black/90 border border-red-900 text-red-500 px-3 py-2 text-[9px] font-bold uppercase hover:bg-red-900/40">Iran</button>
                <button onclick="filterByCountry('ISRAËL', [31.5, 34.8], 7)" class="bg-black/90 border border-blue-900 text-blue-500 px-3 py-2 text-[9px] font-bold uppercase hover:bg-blue-900/40">Israël</button>
                <button onclick="filterByCountry('LIBAN', [33.8, 35.8], 8)" class="bg-black/90 border border-yellow-700 text-yellow-500 px-3 py-2 text-[9px] font-bold uppercase hover:bg-yellow-700/40">Liban</button>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        function addTacticalGrid() {
            const style = { color: 'rgba(0, 255, 102, 0.08)', weight: 0.5, interactive: false };
            for (let i = -180; i <= 180; i += 15) { L.polyline([[-90, i], [90, i]], style).addTo(map); }
            for (let i = -90; i <= 90; i += 15) { L.polyline([[i, -180], [i, 180]], style).addTo(map); }
        }
        addTacticalGrid();

        let allNewsData = [];
        let currentFilter = 'ALL';
        let alertFiredThisSession = false;

        function filterByCountry(c, coords, z) { 
            currentFilter = c; 
            map.flyTo(coords, z, {duration: 1.5}); 
            updateNewsDisplay(); 
        }

        function updateNewsDisplay() {
            const feed = document.getElementById('news-feed');
            const filtered = allNewsData.filter(n => currentFilter === 'ALL' || n.text.includes(currentFilter));
            feed.innerHTML = filtered.map(n => `
                <div class="p-2 border-l-2 ${n.urgent ? 'bg-red-950/20 border-red-600' : 'bg-green-950/5 border-green-900'} mb-2 text-[10px]">
                    <div class="flex justify-between text-[7px] opacity-60 mb-1 font-bold"><span>${n.source}</span><span>${n.time}</span></div>
                    <p class="text-white leading-tight uppercase font-bold">${n.text}</p>
                </div>
            `).join('');
        }

        async function refreshData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                allNewsData = d.news || [];
                
                document.getElementById('update-time').innerText = "SYNC: " + d.last_update;
                document.getElementById('count-impacts').innerText = (d.impacts || []).length;
                if (allNewsData.length > 0) document.getElementById('latest-time').innerText = allNewsData[0].time;

                const urgentNews = allNewsData.filter(n => n.urgent);

                // --- ALERTE SESSION ---
                if(urgentNews.length > 0 && !alertFiredThisSession) {
                    alertFiredThisSession = true;
                    document.getElementById('emergency-overlay').style.display = 'block';
                    document.getElementById('critical-popup').style.display = 'block';
                    document.getElementById('popup-text').innerText = urgentNews[0].text;
                    setTimeout(() => {
                        document.getElementById('emergency-overlay').style.display = 'none';
                        document.getElementById('critical-popup').style.display = 'none';
                    }, 7000);
                }

                // --- BANDEAU DYNAMIQUE (REMIS) ---
                const marqueeElement = document.getElementById('marquee-text');
                marqueeElement.innerText = urgentNews.length > 0 
                    ? urgentNews.slice(0, 3).map(n => ` [ ${n.time} ] ${n.text} `).join(' /// ') 
                    : "VEILLE RADAR ACTIVE /// SYSTÈME OPÉRATIONNEL /// " + d.last_update;

                updateNewsDisplay();
            } catch(e) { console.error("Erreur Sync:", e); }
        }

        setInterval(refreshData, 30000); 
        refreshData();
        window.addEventListener('resize', () => map.invalidateSize());
    </script>
</body>
</html>
