<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --main-color: #00ff66; --border-color: #004411; --bg-panel: rgba(0, 5, 0, 0.95); }
        .stealth-mode { --main-color: #ffaa00; --border-color: #442200; }

        body { background: #000; color: var(--main-color); font-family: 'JetBrains Mono'; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #main-container { display: flex; flex-grow: 1; overflow: hidden; }
        aside#sidebar { width: 320px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; background: var(--bg-panel); flex-shrink: 0; }
        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #000 !important; }

        /* BANDEAU ALERTES */
        .alert-bar { background: #450a0a; border-bottom: 1px solid #ef4444; color: #fca5a5; padding: 6px 0; font-size: 11px; font-weight: bold; overflow: hidden; white-space: nowrap; flex-shrink: 0; }
        .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 80s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* EFFETS CARTE */
        .heat-zone { fill: #ff0000; fill-opacity: 0.4; stroke: #ff0000; stroke-width: 1; animation: pulse-heat 2s infinite ease-in-out; }
        @keyframes pulse-heat { 0% { fill-opacity: 0.1; } 50% { fill-opacity: 0.4; } 100% { fill-opacity: 0.1; } }
        
        .line-anim { stroke-dasharray: 5, 10; animation: dash 20s linear infinite; stroke: rgba(0, 255, 102, 0.2); }
        @keyframes dash { to { stroke-dashoffset: -500; } }

        .btn-country { background: rgba(0,0,0,0.8); border: 1px solid var(--border-color); color: var(--main-color); padding: 6px 10px; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        
        @media (max-width: 768px) {
            body { height: auto !important; display: block !important; }
            #main-container { flex-direction: column !important; height: auto !important; }
            aside#sidebar { width: 100% !important; height: 42vh !important; border-bottom: 1px solid var(--border-color); }
            #map-container { height: 58vh !important; width: 100% !important; }
        }
    </style>
</head>
<body id="app-body">
    <header class="p-3 border-b border-green-900/30 flex justify-between items-center bg-black shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[10px] font-bold tracking-widest uppercase text-white">SITREP-ONE // LIVE</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="hidden md:flex flex-col items-end">
                <span class="text-[7px] opacity-50 uppercase leading-none">Last Scan</span>
                <span id="sync-val" class="text-[10px] font-bold text-green-500 leading-none">--:--:--</span>
            </div>
            <button onclick="toggleStealth()" class="text-[9px] border border-green-900 px-2 py-1 uppercase text-green-500">Stealth</button>
            <a href="france.html" class="bg-blue-700 px-3 py-1 text-white text-[9px] font-bold uppercase">Unit_FR</a>
        </div>
    </header>

    <div class="alert-bar uppercase font-mono">
        <div id="marquee-text" class="marquee-content text-red-100">DATA_LINK_ESTABLISHED /// GRID_SCAN_ACTIVE...</div>
    </div>

    <div id="main-container">
        <aside id="sidebar">
            <div class="p-3 border-b border-green-900/20">
                <div class="bg-black border border-green-900 p-2 text-center mb-3">
                    <p class="text-[7px] opacity-50 uppercase">NASA Detected Impacts</p>
                    <p id="nasa-val" class="text-lg font-bold text-white">00</p>
                </div>
                <input type="text" id="search-bar" placeholder="RECHERCHE TACTIQUE (EX: DRONE...)" class="w-full bg-black/50 border border-green-900 p-2 text-[10px] text-green-400 outline-none mb-1">
            </div>
            
            <div class="bg-red-950/40 text-[9px] font-bold text-red-500 uppercase px-4 py-1.5 border-b border-red-900/30 italic tracking-widest">Intel Stream</div>
            <div id="news-feed" class="flex-grow overflow-y-auto p-3 space-y-3"></div>
            
            <a href="archives.html" class="p-2 text-center text-[9px] font-bold border-t border-green-900 hover:bg-green-900/10">ARCHIVES_LOGS</a>
        </aside>

        <div id="map-container">
            <div class="absolute top-4 left-0 right-0 z-[1000] flex justify-center gap-1.5 px-2">
                <button onclick="filterByCountry('ALL', [32, 53], 4)" class="btn-country">Global</button>
                <button onclick="filterByCountry('IRAN', [32.4, 53.6], 5)" class="btn-country">Iran</button>
                <button onclick="filterByCountry('ISRAËL', [31.5, 34.8], 7)" class="btn-country">Israël</button>
                <button onclick="filterByCountry('LIBAN', [33.8, 35.8], 8)" class="btn-country">Liban</button>
                <button onclick="toggleMapLayer()" class="btn-country" id="map-mode-btn">Pop. OFF</button>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const popLayer = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png');
        
        let impactMarkers = L.layerGroup().addTo(map);
        let trajectoryLines = L.layerGroup().addTo(map);

        function toggleMapLayer() {
            const btn = document.getElementById('map-mode-btn');
            if (map.hasLayer(popLayer)) { map.removeLayer(popLayer); btn.innerText = "Pop. OFF"; }
            else { popLayer.addTo(map); btn.innerText = "Pop. ON"; }
        }

        function drawTacticalLines() {
            trajectoryLines.clearLayers();
            const points = [
                [[32.4, 53.6], [31.5, 34.8]], 
                [[33.8, 35.8], [31.5, 34.8]]
            ];
            points.forEach(p => {
                L.polyline(p, {className: 'line-anim', color: '#00ff66', weight: 1, opacity: 0.2}).addTo(trajectoryLines);
            });
        }

        async function loadData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                
                // --- MISE À JOUR HEADER (TOP RIGHT) ---
                document.getElementById('sync-val').innerText = d.last_update;
                document.getElementById('nasa-val').innerText = (d.impacts.length < 10 ? '0' : '') + d.impacts.length;

                impactMarkers.clearLayers();
                d.impacts.forEach(imp => {
                    L.circle([imp.lat, imp.lon], { radius: 30000, className: 'heat-zone' }).addTo(impactMarkers);
                    L.circleMarker([imp.lat, imp.lon], { radius: 2, color: '#ff0000', fillOpacity: 1 }).addTo(impactMarkers);
                });

                drawTacticalLines();
                allNews = d.news;
                updateDisplay();

                document.getElementById('marquee-text').innerText = allNews.filter(n => n.urgent).length > 0 
                    ? allNews.filter(n => n.urgent).slice(0, 3).map(n => ` [ ${n.time} ] ${n.text} `).join(' /// ')
                    : "VEILLE RADAR ACTIVE /// " + d.last_update;

            } catch(e) { console.error("Sync Error"); }
        }

        let allNews = [];
        let currentFilter = 'ALL';

        function filterByCountry(c, coords, z) {
            currentFilter = c;
            map.flyTo(coords, z, {duration: 1.5});
            updateDisplay();
        }

        function updateDisplay() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const feed = document.getElementById('news-feed');
            const filtered = allNews.filter(n => 
                (currentFilter === 'ALL' || n.text.includes(currentFilter)) && 
                (query === "" || n.text.toLowerCase().includes(query))
            );
            feed.innerHTML = filtered.map(n => `
                <div class="p-2 border-l-2 ${n.urgent ? 'bg-red-950/20 border-red-600' : 'bg-green-950/5 border-green-900'} text-[10px]">
                    <div class="flex justify-between text-[7px] opacity-60 mb-1 font-bold"><span>${n.source}</span><span>${n.time}</span></div>
                    <b class="uppercase leading-tight text-white">${n.text}</b>
                </div>
            `).join('');
        }

        function toggleStealth() { document.getElementById('app-body').classList.toggle('stealth-mode'); }
        document.getElementById('search-bar').addEventListener('input', updateDisplay);
        
        setInterval(loadData, 30000);
        loadData();
    </script>
</body>
</html>
