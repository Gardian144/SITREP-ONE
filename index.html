<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE | TACTICAL MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --neon-green: #00ff66; --neon-red: #ff003c; --hot-orange: #ff6600; }
        body { background: #0a0a0c; color: var(--neon-green); font-family: 'JetBrains Mono', monospace; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.5s; }
        
        /* ALERTE ROUGE */
        body.emergency { background: #200 !important; animation: alarm 1s infinite; }
        @keyframes alarm { 0% { box-shadow: inset 0 0 100px #f00; } 50% { box-shadow: inset 0 0 200px #500; } 100% { box-shadow: inset 0 0 100px #f00; } }

        .tactical-panel { background: rgba(15, 15, 20, 0.9); border: 1px solid rgba(0, 255, 102, 0.2); }
        #main-grid { display: grid; grid-template-columns: repeat(12, 1fr); flex-grow: 1; gap: 10px; padding: 10px; overflow: hidden; }
        #map { height: 100%; width: 100%; background: #050505 !important; }
        
        .strike-marker { animation: pulse 2s infinite; border-radius: 50%; background: var(--neon-red); border: 1px solid white; }
        .missile-path { stroke-dasharray: 5, 10; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -20; } }

        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 20s linear infinite; }
        .cmd-btn { background: rgba(0, 255, 102, 0.05); border: 1px solid var(--neon-green); color: var(--neon-green); font-size: 9px; padding: 5px 10px; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%); cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="alert-bar" class="bg-red-900 text-white text-[10px] py-1 overflow-hidden whitespace-nowrap border-b border-red-600">
        <div id="ticker" class="animate-marquee px-4 uppercase font-bold">CHARGEMENT DES FLUX TACTIQUES...</div>
    </div>

    <header class="flex justify-between items-center px-4 py-2 tactical-panel border-b-2 border-green-500/50">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
            <h1 class="text-xs md:text-sm tracking-[0.3em] font-bold font-[Orbitron]">SITREP-ONE</h1>
        </div>
        <div class="flex gap-4 items-center">
            <span id="threat-count" class="text-lg font-bold text-red-500 font-mono">00</span>
            <a href="france.html" class="cmd-btn border-blue-500 text-blue-400">FRANCE 🇫🇷</a>
        </div>
    </header>

    <main id="main-grid">
        <aside id="side-panel" class="col-span-3 tactical-panel flex flex-col overflow-hidden">
            <div class="p-2 bg-green-500/10 border-b border-green-500/20 text-[9px] font-bold uppercase">Intel_Stream</div>
            <div id="intel-feed" class="p-2 space-y-2 overflow-y-auto flex-grow text-[10px]"></div>
        </aside>
        <section class="col-span-9 tactical-panel relative overflow-hidden">
            <div id="map"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([25.0, 45.0], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function sync() {
            try {
                const res = await fetch('data.json?u=' + Date.now());
                const d = await res.json();
                
                // 1. Alerte Rouge
                if(d.emergency) { document.body.classList.add('emergency'); document.getElementById('status-dot').style.backgroundColor = 'red'; }
                else { document.body.classList.remove('emergency'); }

                // 2. News
                document.getElementById('ticker').innerText = d.news.join(' /// ');
                document.getElementById('threat-count').innerText = d.alerts.length.toString().padStart(2, '0');

                // 3. Map & Feed
                map.eachLayer(l => { if(l instanceof L.CircleMarker || l instanceof L.Polyline) map.removeLayer(l); });
                const feed = document.getElementById('intel-feed'); feed.innerHTML = '';

                d.alerts.forEach(a => {
                    feed.innerHTML += `<div class="p-2 border-l-2 border-red-500 bg-red-500/5 mb-2"><b>${a.time} UTC</b><br>KINETIC IMPACT</div>`;
                    L.circleMarker([a.lat, a.lng], {radius: 6, className: 'strike-marker'}).addTo(map);
                });

                d.trajectories.forEach(t => {
                    L.polyline([t.from, t.to], {color: 'red', weight: 1, className: 'missile-path'}).addTo(map);
                });
            } catch (e) { console.log("Link error"); }
        }
        setInterval(sync, 20000); sync();
    </script>
</body>
</html>
