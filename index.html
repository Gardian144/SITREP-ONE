<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITREP-ONE | TACTICAL SATELLITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #050505; color: #00ff41; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }
        .bento-card { background: rgba(0, 20, 0, 0.2); border: 1px solid #004411; position: relative; }
        #map { height: 100%; width: 100%; filter: brightness(0.7) contrast(1.2) saturate(0.5) hue-rotate(80deg); }
        .scanline { width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 2px, 3px 100%; pointer-events: none; position: absolute; z-index: 1000; }
        .pulse-marker { animation: ripple 2s infinite; border-radius: 50%; background: #ff0000; box-shadow: 0 0 15px #ff0000; }
        @keyframes ripple { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #004411; }
    </style>
</head>
<body class="flex flex-col p-2 gap-2">

    <header class="flex justify-between items-center border-b border-green-900 pb-1 px-4">
        <div class="flex items-center gap-3">
            <div class="h-2 w-2 bg-red-600 animate-ping"></div>
            <h1 class="text-xs font-bold tracking-[0.5em] uppercase">Moyen-Orient // Live Satellite</h1>
        </div>
        <div class="flex gap-10">
            <div class="text-right"><div class="text-[8px] opacity-50 uppercase">Alertes 24h</div><div id="count" class="text-lg font-bold text-red-500">00</div></div>
            <div class="text-right border-l border-green-900 pl-4"><div class="text-[8px] opacity-50 uppercase">Status</div><div class="text-xs text-green-400">EN LIGNE</div></div>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-2 flex-grow overflow-hidden">
        <div class="col-span-3 bento-card flex flex-col overflow-hidden border-green-900/50">
            <div class="p-2 text-[10px] bg-green-900/20 font-bold border-b border-green-900 uppercase tracking-tighter">Flux de Données NASA</div>
            <div id="news-feed" class="p-2 overflow-y-auto space-y-3 flex-grow"></div>
        </div>

        <div class="col-span-9 bento-card relative">
            <div class="scanline"></div>
            <div id="map"></div>
            <div class="absolute bottom-4 right-4 z-[1001] flex gap-2">
                <button onclick="map.flyTo([32.42, 53.68], 5)" class="text-[9px] bg-black border border-green-900 px-2 py-1 hover:bg-green-900">IRAN</button>
                <button onclick="map.flyTo([31.04, 34.85], 7)" class="text-[9px] bg-black border border-green-900 px-2 py-1 hover:bg-green-900">LEVANT</button>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Zoom par défaut sur le Moyen-Orient
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([32.0, 45.0], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function update() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                document.getElementById('count').innerText = data.length.toString().padStart(2, '0');
                
                const feed = document.getElementById('news-feed');
                feed.innerHTML = '';
                map.eachLayer(l => { if(l instanceof L.CircleMarker) map.removeLayer(l); });

                data.reverse().forEach(ev => {
                    feed.innerHTML += `
                        <div class="p-2 border border-green-900/30 bg-green-900/5 text-[10px]">
                            <div class="text-red-500 font-bold mb-1">${ev.time} UTC - HIT</div>
                            <div class="text-white uppercase font-bold">${ev.title}</div>
                            <div class="opacity-50 text-[9px]">COORD: ${ev.lat}, ${ev.lng}</div>
                        </div>`;
                    
                    L.circleMarker([ev.lat, ev.lng], {
                        radius: 7, color: '#ff0000', fillColor: '#ff0000', fillOpacity: 0.8
                    }).addTo(map).bindPopup(ev.title);
                });
            } catch (e) { console.log("Scan..."); }
        }
        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
