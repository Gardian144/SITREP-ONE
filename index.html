<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND TACTICAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        /* STRUCTURE PC */
        body { 
            background: #050505; color: #00ff66; font-family: 'JetBrains Mono'; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        #main-container { display: flex; flex-direction: row; flex-grow: 1; overflow: hidden; }
        aside#sidebar { width: 300px; flex-shrink: 0; border-right: 1px solid #004411; display: flex; flex-direction: column; overflow: hidden; }
        #map-container { flex-grow: 1; position: relative; height: 100%; overflow: hidden; }
        #map { height: 100%; width: 100%; background: #000 !important; }

        /* EFFETS CARTE : RADAR & GRILLE */
        #map::after {
            content: ""; position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            border-radius: 50%; box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.6);
            animation: radar-scan 4s infinite linear; pointer-events: none; z-index: 1000;
        }
        @keyframes radar-scan {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.6); opacity: 1; }
            100% { box-shadow: 0 0 0 1000px rgba(0, 255, 102, 0); opacity: 0; }
        }
        .leaflet-vclines, .leaflet-hclines { stroke: rgba(0, 68, 17, 0.5); stroke-width: 0.5; pointer-events: none; }

        /* --- MODE MOBILE --- */
        @media (max-width: 768px) {
            body { height: auto !important; overflow-y: auto !important; display: block !important; }
            #main-container { display: flex !important; flex-direction: column !important; height: auto !important; }
            
            /* Répartition : 40% News / 60% Map */
            aside#sidebar { width: 100% !important; height: 40vh !important; border-right: none !important; border-bottom: 1px solid #004411 !important; }
            #map-container { width: 100% !important; height: 60vh !important; }
            
            /* Compactage News Mobile */
            .news-item { padding: 6px !important; gap: 2px !important; }
            .news-text { font-size: 10px !important; }
            .news-meta { font-size: 8px !important; }
            
            /* Filtres Map compacts */
            .filter-btns button { font-size: 8px !important; padding: 4px 6px !important; }
        }

        /* ÉLÉMENTS GRAPHIQUES */
        .panel { background: rgba(0, 5, 0, 0.95); border: 1px solid #004411; }
        
        /* BANDEAU ALERTES MINIFIÉ */
        .alert-bar { 
            background: #2a0505; border-bottom: 1px solid #991b1b; color: #fca5a5; 
            padding: 4px 0; font-size: 11px; font-weight: bold; overflow: hidden; 
            white-space: nowrap; flex-shrink: 0; 
        }
        .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 100s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* ALERTES */
        .emergency-border { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: 4px solid #ff0000; box-shadow: inset 0 0 30px #7f0000; z-index: 9999; pointer-events: none; animation: alert-flash 1s infinite; display: none; }
        @keyframes alert-flash { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.5; } }
        #critical-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(100, 0, 0, 0.95); border: 2px solid #ff0000; color: white; padding: 15px; z-index: 10000; display: none; text-align: center; width: 80%; box-shadow: 0 0 50px #000; }
        
        .pulse-icon { background: rgba(255, 0, 0, 0.5); border: 1px solid #ff0000; border-radius: 50%; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #006622; }
    </style>
</head>
<body>
    <div id="emergency-overlay" class="emergency-border"></div>
    <div id="critical-popup">
        <p class="text-[9px] uppercase tracking-widest mb-1 opacity-70">— ALERTE TACTIQUE —</p>
        <h2 id="popup-text" class="text-lg font-bold uppercase tracking-tighter leading-tight text-white"></h2>
    </div>

    <header class="p-2 panel flex justify-between items-center shrink-0 border-b border-green-900/30">
        <div class="flex items-center gap-2">
            <div class="w-1.5 h-1.5 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[9px] font-bold tracking-widest uppercase text-white">SITREP-ONE // C2_NODE</h1>
        </div>
        <div class="flex gap-3 items-center text-[8px]">
            <span id="update-time" class="opacity-50 text-green-600">SYNC: --:--</span>
            <a href="france.html" class="bg-blue-950 px-2 py-0.5 text-white font-bold uppercase transition-all hover:bg-blue-800 text-[8px]">UNIT_FR</a>
        </div>
    </header>

    <div class="alert-bar tracking-[0.2em] uppercase font-mono">
        <div id="marquee-text" class="marquee-content">ACTIVE GRID SCAN... FEED_OK...</div>
    </div>

    <div id="main-container">
        <aside id="sidebar" class="panel flex flex-col overflow-hidden">
            <div class="p-3 border-b border-green-900/20">
                <div class="grid grid-cols-2 gap-1.5">
                    <div class="bg-green-950/30 p-1.5 border border-green-900/30 text-center">
                        <p class="text-[7px] opacity-60 uppercase font-bold">Alertes NASA</p>
                        <p id="count-impacts" class="text-lg font-bold text-white">00</p>
                    </div>
                    <div class="bg-green-950/30 p-1.5 border border-green-900/30 text-center">
                        <p class="text-[7px] opacity-60 uppercase font-bold">Dernier Intel</p>
                        <p id="latest-time" class="text-lg font-bold text-white">--:--</p>
                    </div>
                </div>
            </div>
            <div id="news-feed" class="flex-grow overflow-y-auto p-3 space-y-2.5"></div>
        </aside>

        <div id="map-container">
            <div class="filter-btns absolute top-3 left-0 right-0 z-[1001] flex gap-1.5 justify-center px-2">
                <button onclick="filterByCountry('ALL', [32, 53], 4)" class="bg-black/80 border border-green-900 text-green-400 px-2.5 py-1.5 text-[8px] font-bold uppercase hover:bg-green-900/30">Global</button>
                <button onclick="filterByCountry('IRAN', [32.4, 53.6], 5)" class="bg-black/90 border border-red-900 text-red-500 px-2.5 py-1.5 text-[8px] font-bold uppercase hover:bg-red-900/30">Iran</button>
                <button onclick="filterByCountry('ISRAËL', [31.5, 34.8], 7)" class="bg-black/90 border border-blue-900 text-blue-500 px-2.5 py-1.5 text-[8px] font-bold uppercase hover:bg-blue-900/30">Israël</button>
                <button onclick="filterByCountry('LIBAN', [33.8, 35.8], 8)" class="bg-black/90 border border-yellow-800 text-yellow-500 px-2.5 py-1.5 text-[8px] font-bold uppercase hover:bg-yellow-900/30">Liban</button>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        
        // Fond de carte ultra-sombre
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // AJOUT GRILLE TACTIQUE (Lignes de coordonnées)
        function addTacticalGrid() {
            const gridStyle = { color: 'rgba(0, 68, 17, 0.4)', weight: 0.5, interactive: false };
            // Latitudes
            for (let lat = -90; lat <= 90; lat += 10) {
                L.polyline([[lat, -180], [lat, 180]], gridStyle).addTo(map);
            }
            // Longitudes
            for (let lon = -180; lon <= 180; lon += 10) {
                L.polyline([[-90, lon], [90, lon]], gridStyle).addTo(map);
            }
        }
        addTacticalGrid();

        let allNewsData = [];
        let currentFilter = 'ALL';
        let alertFiredThisSession = false;

        function filterByCountry(country, coords, zoom) {
            currentFilter = country;
            map.flyTo(coords, zoom, { duration: 1.5 });
            updateNewsDisplay();
        }

        function updateNewsDisplay() {
            const feed = document.getElementById('news-feed');
            const filtered = allNewsData.filter(n => currentFilter === 'ALL' || n.text.includes(currentFilter));
            feed.innerHTML = filtered.map(n => `
                <div class="news-item p-2 border-l-2 ${n.urgent ? 'bg-red-950/30 border-red-700' : 'bg-green-950/10 border-green-900'} mb-1.5 flex flex-col gap-1">
                    <div class="flex justify-between news-meta text-[7px] opacity-70 font-mono"><span>${n.source}</span><span>${n.time}</span></div>
                    <p class="text-white news-text text-[10px] leading-snug uppercase font-bold font-mono tracking-tight">${n.text}</p>
                </div>
            `).join('');
        }

        async function refreshData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                allNewsData = d.news || [];
                
                document.getElementById('update-time').innerText = "SYNC: " + d.last_update;
                document.getElementById('count-impacts').innerText = (d.impacts || []).length;
                if (allNewsData.length > 0) document.getElementById('latest-time').innerText = allNewsData[0].time;

                const urgentNews = allNewsData.filter(n => n.urgent);

                // --- LOGIQUE ALERTE SESSION ---
                if(urgentNews.length > 0 && !alertFiredThisSession) {
                    alertFiredThisSession = true;
                    
                    const overlay = document.getElementById('emergency-overlay');
                    const popup = document.getElementById('critical-popup');
                    const sidebar = document.getElementById('sidebar');

                    overlay.style.display = 'block';
                    popup.style.display = 'block';
                    sidebar.classList.add('shake');
                    document.getElementById('popup-text').innerText = urgentNews[0].text;

                    setTimeout(() => {
                        overlay.style.display = 'none';
                        popup.style.display = 'none';
                        sidebar.classList.remove('shake');
                    }, 6000); // Popup un peu plus courte
                }

                const marqueeElement = document.getElementById('marquee-text');
                marqueeElement.innerText = urgentNews.length > 0 ? urgentNews.slice(0, 3).map(n => ` [ ${n.time} ] ${n.text} `).join(' /// ') : "GRID_SCAN ACTIVE /// C2_FEED_OK /// " + d.last_update;
                updateNewsDisplay();
            } catch(e) { console.error(e); }
        }

        setInterval(refreshData, 30000); 
        refreshData();
        window.addEventListener('resize', () => { map.invalidateSize(); });
    </script>
</body>
</html>
