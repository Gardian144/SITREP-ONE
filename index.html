<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITREP | KINETIC MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: #e0e0e0; font-family: 'JetBrains Mono', monospace; overflow: hidden; transition: background-color 0.3s; }
        .bento-card { background: rgba(15, 15, 15, 0.9); border: 1px solid #222; border-radius: 4px; position: relative; }
        #map { height: 100%; width: 100%; filter: brightness(0.6) contrast(1.3) saturate(0.2) sepia(0.2) hue-rotate(-15deg); }
        
        /* Animations tactiques */
        .flash-red { animation: flash 0.6s ease-out; }
        @keyframes flash { 0% { background-color: rgba(255, 0, 0, 0.4); } 100% { background-color: transparent; } }
        
        .pulse-icon { border-radius: 50%; animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 
            0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); } 
            70% { box-shadow: 0 0 0 15px rgba(255, 68, 68, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); } 
        }

        .scanline { width: 100%; height: 2px; background: rgba(255, 255, 255, 0.05); position: absolute; top: 0; animation: scan 6s linear infinite; z-index: 10; pointer-events: none; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="h-screen flex flex-col p-4 gap-4">

    <header class="flex justify-between items-center border-b border-zinc-800 pb-2">
        <div class="flex items-center gap-4">
            <div class="h-3 w-3 bg-red-600 rounded-full animate-pulse"></div>
            <h1 class="text-xl font-bold tracking-tighter uppercase">SITREP // AUTO-MONITOR V2</h1>
        </div>
        <div id="sync-status" class="text-[10px] text-green-500 animate-pulse uppercase">Satellite Sync: OK</div>
    </header>

    <main class="grid grid-cols-12 gap-4 flex-grow overflow-hidden">
        <section class="col-span-3 bento-card flex flex-col overflow-hidden">
            <div class="p-2 border-b border-zinc-800 bg-zinc-900 text-[10px] font-bold text-red-500">KINETIC FEED (AUTO)</div>
            <div class="p-4 space-y-4 overflow-y-auto text-[11px]" id="news-feed"></div>
        </section>

        <section class="col-span-9 bento-card overflow-hidden relative">
            <div class="scanline"></div>
            <div id="map"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { zoomControl: false }).setView([32.4279, 53.6880], 5);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        let lastEventCount = 0;
        const alertAudio = new Audio('https://www.soundjay.com/buttons/sounds/beep-01a.mp3');

        async function updateData() {
            try {
                const response = await fetch('data.json?t=' + Date.now());
                const events = await response.json();

                if (events.length > lastEventCount && lastEventCount !== 0) {
                    triggerGlobalAlert();
                }
                lastEventCount = events.length;

                const feed = document.getElementById('news-feed');
                feed.innerHTML = '';
                
                // On efface les anciens marqueurs
                map.eachLayer((layer) => { if (!!layer.toGeoJSON) map.removeLayer(layer); });
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

                events.forEach(event => {
                    // Ajout au flux
                    const isStrike = event.type === 'STRIKE' || event.type === 'FIRE';
                    const color = isStrike ? 'red' : 'blue';
                    feed.innerHTML = `
                        <div class="border-l-2 border-${color}-600 pl-3 py-2 bg-${color}-900/10 mb-3">
                            <div class="text-[9px] text-zinc-500">${event.time} UTC</div>
                            <div class="font-bold text-white uppercase">${event.title}</div>
                            <div class="text-[10px] text-zinc-400">${event.desc}</div>
                        </div>
                    ` + feed.innerHTML;

                    // Ajout Marqueur
                    L.circleMarker([event.lat, event.lng], {
                        color: isStrike ? '#ff4444' : '#44aaff',
                        radius: isStrike ? 10 : 6,
                        className: isStrike ? 'pulse-icon' : ''
                    }).addTo(map).bindPopup(event.title);
                });
            } catch (e) { console.log("Waiting for data..."); }
        }

        function triggerGlobalAlert() {
            document.body.classList.add('flash-red');
            setTimeout(() => document.body.classList.remove('flash-red'), 600);
            alertAudio.play().catch(() => {});
            document.getElementById('sync-status').innerText = "NEW DATA RECEIVED";
            setTimeout(() => document.getElementById('sync-status').innerText = "Satellite Sync: OK", 5000);
        }

        setInterval(updateData, 15000);
        updateData();
    </script>
</body>
</html>
