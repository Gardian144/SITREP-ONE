<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { background: #050505; color: #00ff66; font-family: 'JetBrains Mono'; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #map-pc, #map-mobile { height: 100%; background: #000 !important; width: 100%; }
        .panel { background: rgba(0, 10, 0, 0.9); border: 1px solid #004411; }

        /* ALERTE ROUGE (RETOUR) */
        .emergency-border {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            border: 8px solid #ff0000; box-shadow: inset 0 0 50px #7f0000;
            z-index: 9999; pointer-events: none; animation: alert-flash 1s infinite; display: none;
        }
        @keyframes alert-flash { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }
        
        #critical-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(139, 0, 0, 0.95); border: 2px solid #ff0000; color: white;
            padding: 20px; z-index: 10000; display: none; text-align: center;
            box-shadow: 0 0 100px rgba(255, 0, 0, 0.5); width: 85%;
        }

        /* MARQUEE */
        .alert-bar { 
            background: #450a0a; border-bottom: 1px solid #ef4444; color: #fca5a5; 
            padding: 8px 0; font-size: 12px; font-weight: bold; overflow: hidden; 
            white-space: nowrap; display: flex; align-items: center; shrink: 0;
        }
        .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 120s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* GESTION PC vs MOBILE */
        .desktop-layout { display: flex; flex-grow: 1; overflow: hidden; }
        .mobile-layout { display: none; }

        @media (max-width: 768px) {
            .desktop-layout { display: none !important; }
            .mobile-layout { display: flex !important; flex-direction: column; flex-grow: 1; overflow-y: auto; }
            body { overflow-y: auto; }
            #map-wrapper-mobile { height: 350px; flex-shrink: 0; position: relative; border-top: 2px solid #004411; }
        }

        .shake { animation: shake-anim 0.3s ease-in-out infinite; }
        @keyframes shake-anim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(3px); } 75% { transform: translateX(-3px); } }
    </style>
</head>
<body class="flex flex-col">

    <div id="emergency-overlay" class="emergency-border"></div>
    <div id="critical-popup">
        <p class="text-[10px] uppercase tracking-widest mb-2 opacity-70">— ALERTE CRITIQUE —</p>
        <h2 id="popup-text" class="text-xl font-bold uppercase tracking-tighter"></h2>
    </div>

    <header class="p-3 panel flex justify-between items-center shrink-0 border-b border-green-900/50">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[10px] md:text-xs font-bold tracking-widest uppercase text-white">SITREP-ONE // LIVE</h1>
        </div>
        <div id="sync-info" class="text-[9px] opacity-50 text-green-500 font-mono">SYNC: --:--</div>
    </header>

    <div class="alert-bar tracking-[0.2em] uppercase">
        <div id="marquee-text" class="marquee-content">INITIALISATION...</div>
    </div>

    <main id="pc-view" class="desktop-layout">
        <aside id="sidebar-pc" class="w-80 panel p-4 flex flex-col shrink-0 border-r border-green-900/30">
            <div class="grid grid-cols-2 gap-2 mb-4 text-center">
                <div class="bg-green-900/10 p-2 border border-green-900/30">
                    <p class="text-[8px] opacity-50 uppercase font-bold">Alertes NASA</p>
                    <p class="count-nasa text-xl font-bold text-white">00</p>
                </div>
                <div class="bg-green-900/10 p-2 border border-green-900/30">
                    <p class="text-[8px] opacity-50 uppercase font-bold">Dernier Intel</p>
                    <p class="last-intel-time text-xl font-bold text-white">--:--</p>
                </div>
            </div>
            <h2 class="text-[10px] font-bold text-red-500 mb-2 uppercase border-b border-red-900/40 pb-1 italic">Intel Stream</h2>
            <div class="feed-container space-y-3 overflow-y-auto flex-grow pr-2"></div>
        </aside>
        <div class="flex-grow relative">
            <div id="map-pc"></div>
        </div>
    </main>

    <main id="mobile-view" class="mobile-layout">
        <div id="sidebar-mobile" class="panel p-4 flex flex-col">
            <div class="grid grid-cols-2 gap-2 mb-4 text-center">
                <div class="bg-green-900/10 p-2 border border-green-900/30">
                    <p class="text-[8px] opacity-50 uppercase font-bold">Alertes NASA</p>
                    <p class="count-nasa text-xl font-bold text-white">00</p>
                </div>
                <div class="bg-green-900/10 p-2 border border-green-900/30">
                    <p class="text-[8px] opacity-50 uppercase font-bold">Dernier Intel</p>
                    <p class="last-intel-time text-xl font-bold text-white">--:--</p>
                </div>
            </div>
            <h2 class="text-[10px] font-bold text-red-500 mb-2 uppercase italic">Intel Stream</h2>
            <div class="feed-container space-y-3 max-h-[45vh] overflow-y-auto font-bold"></div>
        </div>
        <div id="map-wrapper-mobile">
            <div id="map-mobile"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const mapPc = L.map('map-pc', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        const mapMob = L.map('map-mobile', {zoomControl: false, attributionControl: false}).setView([32, 53], 3);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapPc);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapMob);

        let allNewsData = [];
        let lastUrgentId = null;

        function updateUI() {
            const feeds = document.querySelectorAll('.feed-container');
            const html = allNewsData.map(n => `
                <div class="p-3 border-l-2 ${n.urgent ? 'bg-red-900/20 border-red-600' : 'bg-green-900/5 border-green-800'} text-[10px] mb-2">
                    <div class="flex justify-between text-[8px] opacity-60 mb-1 font-bold"><span>${n.source}</span><span>${n.time}</span></div>
                    <p class="text-white leading-tight uppercase font-bold">${n.text}</p>
                </div>
            `).join('');
            feeds.forEach(f => f.innerHTML = html);
        }

        async function refreshData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                allNewsData = d.news || [];
                
                document.getElementById('sync-info').innerText = "SYNC: " + d.last_update;
                document.querySelectorAll('.count-nasa').forEach(el => el.innerText = (d.impacts || []).length);
                if (allNewsData.length > 0) {
                    document.querySelectorAll('.last-intel-time').forEach(el => el.innerText = allNewsData[0].time);
                }

                // GESTION ALERTE ROUGE
                const urgentNews = allNewsData.filter(n => n.urgent);
                const overlay = document.getElementById('emergency-overlay');
                const popup = document.getElementById('critical-popup');
                const sidebarPc = document.getElementById('sidebar-pc');
                const sidebarMob = document.getElementById('sidebar-mobile');

                if(urgentNews.length > 0 && urgentNews[0].id !== lastUrgentId) {
                    lastUrgentId = urgentNews[0].id;
                    overlay.style.display = 'block';
                    popup.style.display = 'block';
                    document.getElementById('popup-text').innerText = urgentNews[0].text;
                    sidebarPc.classList.add('shake');
                    sidebarMob.classList.add('shake');

                    setTimeout(() => {
                        overlay.style.display = 'none';
                        popup.style.display = 'none';
                        sidebarPc.classList.remove('shake');
                        sidebarMob.classList.remove('shake');
                    }, 8000);
                }

                const marqueeElement = document.getElementById('marquee-text');
                marqueeElement.innerText = urgentNews.length > 0 ? urgentNews.slice(0, 3).map(n => ` [ ${n.time} ] ${n.text} `).join(' /// ') : "VEILLE ACTIVE /// " + d.last_update;

                updateUI();
            } catch(e) { console.error("Error", e); }
        }

        setInterval(refreshData, 30000);
        refreshData();
        window.addEventListener('resize', () => { mapPc.invalidateSize(); mapMob.invalidateSize(); });
    </script>
</body>
</html>
