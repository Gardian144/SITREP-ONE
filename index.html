<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // CMD-V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        /* LOGIQUE MOBILE PAR DÉFAUT (EMPILEMENT) */
        body { 
            background: #050505; color: #00ff66; font-family: 'JetBrains Mono'; 
            margin: 0; display: flex; flex-direction: column; 
            min-height: 100vh; overflow-x: hidden;
        }

        #main-wrapper { 
            display: flex; 
            flex-direction: column; /* MOBILE : News en haut, Map en bas */
            flex-grow: 1;
        }

        aside#sidebar { 
            width: 100%; 
            height: 45vh; 
            border-bottom: 2px solid #004411; 
            background: rgba(0, 10, 0, 0.9);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        #map-container { 
            width: 100%; 
            height: 45vh; 
            position: relative;
        }

        /* LOGIQUE PC (SI L'ÉCRAN EST LARGE) */
        @media (min-width: 1024px) {
            body { height: 100vh; overflow: hidden; }
            #main-wrapper { flex-direction: row; }
            aside#sidebar { width: 380px; height: 100%; border-right: 2px solid #004411; border-bottom: none; }
            #map-container { flex-grow: 1; height: 100%; }
        }

        /* ÉLÉMENTS VISUELS */
        #map { height: 100%; width: 100%; background: #000 !important; }
        .panel { background: rgba(0, 10, 0, 0.9); border: 1px solid #004411; }
        
        .alert-bar { background: #450a0a; border-bottom: 1px solid #ef4444; color: #fca5a5; padding: 8px 0; font-size: 12px; overflow: hidden; white-space: nowrap; }
        .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 120s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .emergency-border { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: 8px solid #ff0000; box-shadow: inset 0 0 50px #7f0000; z-index: 9999; pointer-events: none; animation: alert-flash 1s infinite; display: none; }
        @keyframes alert-flash { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }
        
        #critical-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(139, 0, 0, 0.95); border: 2px solid #ff0000; color: white; padding: 20px; z-index: 10000; display: none; text-align: center; width: 85%; }
        .shake { animation: shake-anim 0.3s ease-in-out infinite; }
        @keyframes shake-anim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(3px); } 75% { transform: translateX(-3px); } }
    </style>
</head>
<body id="cmd-body">
    <div id="emergency-overlay" class="emergency-border"></div>
    <div id="critical-popup">
        <p class="text-[10px] uppercase tracking-widest mb-2 opacity-70">— ALERTE CRITIQUE —</p>
        <h2 id="popup-text" class="text-xl font-bold uppercase tracking-tighter"></h2>
    </div>

    <header class="p-3 panel flex justify-between items-center shrink-0 border-b border-green-900/50">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[10px] md:text-xs font-bold tracking-widest uppercase text-white">SITREP-ONE // LIVE</h1>
        </div>
        <div class="flex gap-4 items-center text-[9px]">
            <span id="update-time" class="opacity-50 font-mono text-green-500">SYNC: --:--</span>
            <a href="france.html" class="bg-blue-900 px-3 py-1 text-white font-bold uppercase">France</a>
        </div>
    </header>

    <div class="alert-bar tracking-[0.2em] uppercase">
        <div id="marquee-text" class="marquee-content">INITIALISATION DU SYSTÈME...</div>
    </div>

    <div id="main-wrapper">
        <aside id="sidebar" class="p-4">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <div class="bg-green-900/10 p-2 border border-green-900/30 text-center">
                    <p class="text-[8px] opacity-50 uppercase font-bold">Alertes NASA</p>
                    <p id="count-impacts" class="text-xl font-bold text-white">00</p>
                </div>
                <div class="bg-green-900/10 p-2 border border-green-900/30 text-center">
                    <p class="text-[8px] opacity-50 uppercase font-bold">Dernier Intel</p>
                    <p id="latest-time" class="text-xl font-bold text-white">--:--</p>
                </div>
            </div>
            <h2 class="text-[10px] font-bold text-red-500 mb-2 uppercase border-b border-red-900/40 pb-1 italic">Intel Stream</h2>
            <div id="news-feed" class="space-y-3 overflow-y-auto flex-grow pr-2 font-bold"></div>
        </aside>

        <div id="map-container">
            <div class="filter-btns absolute top-4 left-1/2 -translate-x-1/2 z-[1001] flex gap-2">
                <button onclick="filterByCountry('ALL', [32, 53], 4)" class="bg-black/90 border border-green-900 px-3 py-1 text-[9px] font-bold text-green-400 uppercase">Global</button>
                <button onclick="filterByCountry('IRAN', [32.4, 53.6], 5)" class="bg-black/90 border border-red-900 px-3 py-1 text-[9px] font-bold text-red-500 uppercase">Iran</button>
                <button onclick="filterByCountry('ISRAËL', [31.5, 34.8], 7)" class="bg-black/90 border border-blue-900 px-3 py-1 text-[9px] font-bold text-blue-500 uppercase">Israël</button>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let allNewsData = [];
        let lastUrgentId = null;

        function updateNewsDisplay() {
            const feed = document.getElementById('news-feed');
            feed.innerHTML = allNewsData.map(n => `
                <div class="p-3 border-l-2 ${n.urgent ? 'bg-red-900/20 border-red-600' : 'bg-green-900/5 border-green-800'} text-[10px] mb-2">
                    <div class="flex justify-between text-[8px] opacity-60 mb-1 font-bold"><span>${n.source}</span><span>${n.time}</span></div>
                    <p class="text-white leading-tight uppercase font-bold">${n.text}</p>
                </div>
            `).join('');
        }

        async function refreshData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                allNewsData = d.news || [];
                document.getElementById('update-time').innerText = "SYNC: " + d.last_update;
                document.getElementById('count-impacts').innerText = (d.impacts || []).length;
                if (allNewsData.length > 0) document.getElementById('latest-time').innerText = allNewsData[0].time;

                const urgentNews = allNewsData.filter(n => n.urgent);
                if(urgentNews.length > 0 && urgentNews[0].id !== lastUrgentId) {
                    lastUrgentId = urgentNews[0].id;
                    document.getElementById('emergency-overlay').style.display = 'block';
                    document.getElementById('sidebar').classList.add('shake');
                    document.getElementById('critical-popup').style.display = 'block';
                    document.getElementById('popup-text').innerText = urgentNews[0].text;
                    setTimeout(() => {
                        document.getElementById('emergency-overlay').style.display = 'none';
                        document.getElementById('sidebar').classList.remove('shake');
                        document.getElementById('critical-popup').style.display = 'none';
                    }, 7000);
                }
                document.getElementById('marquee-text').innerText = urgentNews.length > 0 ? urgentNews.slice(0, 3).map(n => ` [ ${n.time} ] ${n.text} `).join(' /// ') : "VEILLE ACTIVE /// " + d.last_update;
                updateNewsDisplay();
            } catch(e) { console.error(e); }
        }

        function filterByCountry(country, coords, zoom) { map.flyTo(coords, zoom, { duration: 1.5 }); }
        setInterval(refreshData, 30000); refreshData();
        window.addEventListener('resize', () => { map.invalidateSize(); });
    </script>
</body>
</html>
