<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { background: #050505; color: #00ff66; font-family: 'JetBrains Mono'; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #map-pc, #map-mobile { height: 100%; background: #000 !important; width: 100%; }
        .panel { background: rgba(0, 10, 0, 0.9); border: 1px solid #004411; }

        /* MARQUEE */
        .alert-bar { 
            background: #450a0a; border-bottom: 1px solid #ef4444; color: #fca5a5; 
            padding: 8px 0; font-size: 12px; font-weight: bold; overflow: hidden; 
            white-space: nowrap; display: flex; align-items: center; shrink: 0;
        }
        .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 120s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* GESTION DE L'AFFICHAGE */
        .desktop-only { display: flex; }
        .mobile-only { display: none; }

        @media (max-width: 768px) {
            .desktop-only { display: none !important; }
            .mobile-only { display: flex !important; flex-direction: column; flex-grow: 1; overflow-y: auto; }
            body { overflow-y: auto; }
            #map-container-mobile { height: 400px; shrink: 0; position: relative; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #004411; }
    </style>
</head>
<body class="flex flex-col">

    <header class="p-3 panel flex justify-between items-center shrink-0 border-b border-green-900/50">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <h1 class="text-[10px] md:text-xs font-bold tracking-widest uppercase text-white">SITREP-ONE // LIVE</h1>
        </div>
        <div class="flex gap-4 items-center text-[9px]">
            <span id="update-time" class="opacity-50 font-mono text-green-500">SYNC: --:--</span>
            <a href="france.html" class="bg-blue-900 px-3 py-1 text-white font-bold uppercase">France</a>
        </div>
    </header>

    <div class="alert-bar tracking-[0.2em] uppercase">
        <div id="marquee-text" class="marquee-content">INITIALISATION SYSTÈME...</div>
    </div>

    <main id="pc-layout" class="desktop-only flex-grow overflow-hidden">
        <aside class="w-80 panel p-4 flex flex-col shrink-0 border-r border-green-900/30">
            <div class="grid grid-cols-2 gap-2 mb-4 text-center">
                <div class="bg-green-900/10 p-2 border border-green-900/30">
                    <p class="text-[8px] opacity-50 uppercase">NASA</p>
                    <p class="count-impacts text-xl font-bold text-white">00</p>
                </div>
                <div class="bg-green-900/10 p-2 border border-green-900/30">
                    <p class="text-[8px] opacity-50 uppercase">DERNIER INTEL</p>
                    <p class="latest-time text-xl font-bold text-white">--:--</p>
                </div>
            </div>
            <h2 class="text-[10px] font-bold text-red-500 mb-2 uppercase italic">Intel Stream</h2>
            <div class="news-feed-content space-y-3 overflow-y-auto flex-grow pr-2 font-bold"></div>
        </aside>
        <div class="flex-grow relative">
            <div id="map-pc"></div>
        </div>
    </main>

    <main id="mobile-layout" class="mobile-only">
        <div class="panel p-4 flex flex-col shrink-0">
            <div class="grid grid-cols-2 gap-2 mb-4 text-center">
                <div class="bg-green-900/10 p-2 border border-green-900/30">
                    <p class="text-[8px] opacity-50 uppercase">NASA</p>
                    <p class="count-impacts text-xl font-bold text-white">00</p>
                </div>
                <div class="bg-green-900/10 p-2 border border-green-900/30">
                    <p class="text-[8px] opacity-50 uppercase">DERNIER INTEL</p>
                    <p class="latest-time text-xl font-bold text-white">--:--</p>
                </div>
            </div>
            <h2 class="text-[10px] font-bold text-red-500 mb-2 uppercase italic">Intel Stream</h2>
            <div class="news-feed-content space-y-3 max-h-[40vh] overflow-y-auto font-bold"></div>
        </div>
        <div id="map-container-mobile">
            <div id="map-mobile"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // On initialise les deux cartes (une seule sera active)
        const mapPc = L.map('map-pc', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        const mapMob = L.map('map-mobile', {zoomControl: false, attributionControl: false}).setView([32, 53], 3);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapPc);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapMob);

        let allNewsData = [];

        function updateNewsDisplay() {
            const feeds = document.querySelectorAll('.news-feed-content');
            const html = allNewsData.map(n => `
                <div class="p-3 border-l-2 ${n.urgent ? 'bg-red-900/20 border-red-600' : 'bg-green-900/5 border-green-800'} text-[10px] mb-2">
                    <div class="flex justify-between text-[8px] opacity-60 mb-1"><span>${n.source}</span><span>${n.time}</span></div>
                    <p class="text-white leading-tight uppercase font-bold">${n.text}</p>
                </div>
            `).join('');
            feeds.forEach(f => f.innerHTML = html);
        }

        async function refreshData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                allNewsData = d.news || [];
                
                document.getElementById('update-time').innerText = "SYNC: " + d.last_update;
                document.querySelectorAll('.count-impacts').forEach(el => el.innerText = (d.impacts || []).length);
                
                if (allNewsData.length > 0) {
                    document.querySelectorAll('.latest-time').forEach(el => el.innerText = allNewsData[0].time);
                }

                const urgentNews = allNewsData.filter(n => n.urgent);
                const marqueeElement = document.getElementById('marquee-text');
                marqueeElement.innerText = urgentNews.length > 0 ? urgentNews.slice(0, 3).map(n => ` [ ${n.time} ] ${n.text} `).join(' /// ') : "VEILLE ACTIVE /// " + d.last_update;

                updateNewsDisplay();
            } catch(e) { console.error("Data error", e); }
        }

        setInterval(refreshData, 30000);
        refreshData();
        
        // Correction pour Leaflet lors du redimensionnement
        window.addEventListener('resize', () => { mapPc.invalidateSize(); mapMob.invalidateSize(); });
    </script>
</body>
</html>
