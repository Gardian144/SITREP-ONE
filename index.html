<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITREP-ONE // COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --main-color: #00ff66; --border-color: #004411; --bg-panel: rgba(0, 10, 0, 0.95); }
        body { background: #000; color: var(--main-color); font-family: 'JetBrains Mono'; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #main-container { display: flex; flex-grow: 1; overflow: hidden; }
        aside#sidebar { width: 320px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; background: var(--bg-panel); flex-shrink: 0; }
        #map-container { flex-grow: 1; position: relative; min-height: 0; }
        #map { height: 100%; width: 100%; background: #000 !important; }
        .alert-bar { background: #450a0a; border-bottom: 1px solid #ef4444; color: #fca5a5; padding: 4px 0; font-size: 10px; overflow: hidden; white-space: nowrap; flex-shrink: 0; }
        .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 80s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            #main-container { flex-direction: column; height: auto; }
            aside#sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border-color); }
            #map-container { height: 40vh; order: -1; } /* Carte toujours visible en haut */
            h1 { font-size: 8px !important; }
            .world-clocks span { font-size: 7px !important; }
        }
    </style>
</head>
<body>
    <header class="p-2 md:p-3 border-b border-green-900/30 flex justify-between items-center bg-black shrink-0">
        <div class="flex flex-col gap-1">
            <h1 class="text-[9px] md:text-[11px] font-bold tracking-tighter uppercase text-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-red-600 rounded-full animate-ping"></span> SITREP-ONE // LIVE
            </h1>
            <div class="world-clocks flex gap-3 font-mono">
                <div class="flex items-center gap-1">
                    <span class="text-[6px] md:text-[8px] opacity-50">ISR/LBN:</span>
                    <span id="time-il-lb" class="text-[7px] md:text-[9px] font-bold text-white">--:--</span>
                </div>
                <div class="flex items-center gap-1">
                    <span class="text-[6px] md:text-[8px] opacity-50">IRAN:</span>
                    <span id="time-ir" class="text-[7px] md:text-[9px] font-bold text-white">--:--</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div class="hidden md:flex flex-col items-end mr-2">
                <span class="text-[7px] opacity-50 uppercase leading-none">Last Scan</span>
                <span id="sync-val-header" class="text-[9px] font-bold text-green-500">--:--</span>
            </div>
            <a href="france.html" class="bg-blue-700 px-2 py-1 text-white text-[8px] md:text-[10px] font-bold uppercase">Unit_FR</a>
        </div>
    </header>

    <div class="alert-bar uppercase font-mono"><div id="marquee-text" class="marquee-content">INITIALISATION...</div></div>

    <div id="main-container">
        <aside id="sidebar">
            <div class="p-3 border-b border-green-900/20">
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <div class="bg-black border border-green-900 p-1 text-center">
                        <p class="text-[6px] opacity-50">NASA</p>
                        <p id="nasa-val" class="text-sm font-bold">0</p>
                    </div>
                    <div class="bg-black border border-green-900 p-1 text-center">
                        <p class="text-[6px] opacity-50">LATEST</p>
                        <p id="latest-time" class="text-sm font-bold">--:--</p>
                    </div>
                </div>
                <input type="text" id="search-bar" placeholder="FILTRER..." class="w-full bg-black/50 border border-green-900 p-1.5 text-[9px] text-green-400 outline-none">
            </div>
            <div id="news-feed" class="flex-grow overflow-y-auto p-2 space-y-2 max-h-[40vh] md:max-h-none"></div>
        </aside>

        <div id="map-container"><div id="map"></div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([32, 53], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        function updateClocks() {
            const opt = { hour: '2-digit', minute: '2-digit', hour12: false, second: '2-digit' };
            document.getElementById('time-il-lb').innerText = new Date().toLocaleTimeString('fr-FR', { ...opt, timeZone: 'Asia/Jerusalem' });
            document.getElementById('time-ir').innerText = new Date().toLocaleTimeString('fr-FR', { ...opt, timeZone: 'Asia/Tehran' });
        }
        setInterval(updateClocks, 1000); updateClocks();

        async function loadData() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                document.getElementById('nasa-val').innerText = d.impacts.length;
                document.getElementById('news-feed').innerHTML = d.news.map(n => `
                    <div class="p-2 border-l border-green-900 bg-green-900/5 text-[9px]">
                        <div class="flex justify-between text-[6px] opacity-50 uppercase"><span>${n.source}</span><span>${n.time}</span></div>
                        <b class="text-white block mt-1 uppercase leading-tight">${n.text}</b>
                    </div>`).join('');
            } catch(e) {}
        }
        loadData(); setInterval(loadData, 30000);
    </script>
</body>
</html>
