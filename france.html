<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRANCE // FORCE DE PROJECTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020617; color: #93c5fd; font-family: 'JetBrains Mono'; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .card { background: rgba(15, 23, 42, 0.9); border: 1px solid #1e3a8a; }
        .leaflet-tooltip { background: #1e3a8a; color: white; border: 1px solid #93c5fd; font-family: 'JetBrains Mono'; font-size: 10px; }

        #content-wrapper { display: flex; flex-grow: 1; gap: 8px; padding: 8px; overflow: hidden; }
        @media (max-width: 768px) {
            #content-wrapper { flex-direction: column; overflow-y: auto; }
            aside { width: 100% !important; order: 2; }
            #map-container { height: 40vh; min-height: 300px; order: 1; }
        }
        
        /* Style pour la barre de défilement */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; }
    </style>
</head>
<body class="p-2 gap-2">
    <header class="p-3 card flex justify-between items-center shrink-0">
        <h1 class="text-[9px] md:text-xs font-bold text-white uppercase tracking-tighter flex items-center gap-2">
            <span class="w-2 h-2 bg-blue-500 rounded-full"></span> EMA // SITREP FRANCE
        </h1>
        <div class="flex items-center gap-2 md:gap-4">
            <span id="sync-status" class="text-[7px] md:text-[8px] text-blue-500 animate-pulse">SYNC EN COURS...</span>
            <a href="index.html" class="bg-blue-600 hover:bg-blue-500 px-2 md:px-3 py-1 text-[9px] md:text-[10px] text-white font-bold transition-colors">RETOUR QG</a>
        </div>
    </header>

    <div id="content-wrapper">
        <aside class="w-1/3 flex flex-col gap-2 shrink-0">
            <div class="card p-4 overflow-hidden flex flex-col h-1/2">
                <h2 class="text-blue-400 text-[10px] font-bold mb-4 border-b border-blue-900 pb-1 uppercase tracking-widest">Ordre de Bataille</h2>
                <div id="unit-list" class="space-y-3 overflow-y-auto pr-2 text-[10px]">
                    </div>
            </div>
            
            <div class="card p-4 overflow-hidden flex flex-col h-1/2">
                <h2 class="text-blue-400 text-[10px] font-bold mb-4 border-b border-blue-900 pb-1 uppercase tracking-widest">Opérations & Exercices</h2>
                <div id="exo-list" class="space-y-2 text-[10px] overflow-y-auto pr-2">
                    </div>
            </div>
        </aside>

        <div id="map-container" class="flex-grow card">
            <div id="map" style="height: 100%; width: 100%;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialisation de la carte centrée sur la zone d'intérêt
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([20, 45], 3);
        
        // Layer Dark Mode
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        // Groupe pour les marqueurs d'unités
        let unitMarkers = L.layerGroup().addTo(map);

        async function updateFrance() {
            try {
                // Fetch des données avec paramètre anti-cache
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                
                // 1. Mise à jour de la liste des unités (avec fonction clic pour déplacer la carte)
                const unitList = document.getElementById('unit-list');
                unitList.innerHTML = d.france.forces.map(u => `
                    <div class="p-2 bg-blue-900/10 border border-blue-800/40 cursor-pointer hover:bg-blue-800/30 hover:border-blue-400 transition-all group" 
                         onclick="map.flyTo([${u.p}], 6)">
                        <div class="flex justify-between font-bold">
                            <span class="group-hover:text-white">${u.n}</span>
                            <span class="text-blue-400 text-[8px]">${u.s}</span>
                        </div>
                        <div class="text-[9px] opacity-60 uppercase">${u.t}</div>
                    </div>
                `).join('');

                // 2. Mise à jour de la liste des exercices
                const exoList = document.getElementById('exo-list');
                exoList.innerHTML = d.france.exercices.map(e => `
                    <div class="p-2 border-l-2 border-blue-500 bg-blue-500/5 mb-1 italic opacity-80">
                        ${e}
                    </div>
                `).join('');

                // 3. Mise à jour des marqueurs sur la carte
                unitMarkers.clearLayers();
                d.france.forces.forEach(u => {
                    L.circleMarker(u.p, {
                        radius: 6,
                        color: '#ffffff', // Bordure blanche pour le contraste
                        weight: 1,
                        fillColor: '#2563eb', // Bleu royal
                        fillOpacity: 0.9
                    })
                    .addTo(unitMarkers)
                    .bindTooltip(u.n, {permanent: false, direction: 'top'});
                });

                // 4. Update du statut de synchronisation
                document.getElementById('sync-status').innerText = "UNITÉS À JOUR : " + d.last_update;
                document.getElementById('sync-status').classList.remove('text-blue-500');
                document.getElementById('sync-status').classList.add('text-green-500');

            } catch (err) {
                console.error("Erreur de synchronisation France:", err);
                document.getElementById('sync-status').innerText = "ERREUR RÉSEAU SATELLITE";
                document.getElementById('sync-status').classList.add('text-red-500');
            }
        }

        // Rafraîchissement toutes les 60 secondes
        setInterval(updateFrance, 60000);
        updateFrance();
    </script>
</body>
</html>
