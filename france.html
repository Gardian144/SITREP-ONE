<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRANCE // FORCE DE PROJECTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020617; color: #93c5fd; font-family: 'JetBrains Mono'; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .card { background: rgba(15, 23, 42, 0.9); border: 1px solid #1e3a8a; }
        .status-badge { font-size: 7px; padding: 1px 4px; border-radius: 2px; text-transform: uppercase; font-weight: bold; }
        .badge-alert { background: #ef4444; color: white; animation: pulse 1.5s infinite; }
        .badge-ops { background: #2563eb; color: white; }
        
        /* Animation Radar Bleue */
        .radar-zone { fill: #3b82f6; fill-opacity: 0.1; stroke: #3b82f6; stroke-width: 1; animation: radar-pulse 4s infinite; }
        @keyframes radar-pulse { 0% { fill-opacity: 0.05; stroke-opacity: 0.8; } 50% { fill-opacity: 0.2; stroke-opacity: 0.3; } 100% { fill-opacity: 0.05; stroke-opacity: 0.8; } }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; }

        @media (max-width: 768px) {
            body { height: auto; overflow-y: auto; }
            #content-wrapper { flex-direction: column; height: auto; overflow: visible; padding-bottom: 20px; }
            aside { width: 100%; height: auto; }
            #map-container { height: 350px; order: -1; margin-bottom: 10px; }
            .side-block { height: 400px !important; } /* Taille fixe pour éviter le dépassement */
            .clocks { display: none; } /* On cache les horloges sur petit mobile pour gagner de la place */
        }
    </style>
</head>
<body class="p-2 gap-2 flex flex-col">
    <header class="p-3 card flex justify-between items-center shrink-0 border-b-2 border-blue-600">
        <div class="flex items-center gap-4">
            <h1 class="text-[9px] md:text-xs font-bold text-white uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></span> EMA // SITREP FRANCE
            </h1>
            <div class="clocks hidden md:flex gap-4 border-l border-blue-900 ml-4 pl-4 text-[8px] uppercase">
                <div>PARIS: <span id="clock-par" class="text-white">--:--</span></div>
                <div>DJIBOUTI: <span id="clock-dji" class="text-white">--:--</span></div>
                <div>NOUMÉA: <span id="clock-nou" class="text-white">--:--</span></div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex flex-col items-end">
                <span class="text-[7px] text-blue-500 font-bold uppercase">Cyber-Alert</span>
                <span class="text-[9px] text-green-400 font-bold">LEVEL: 01</span>
            </div>
            <a href="index.html" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 text-[10px] text-white font-bold transition-all uppercase">Terminal</a>
        </div>
    </header>

    <div id="content-wrapper" class="flex flex-grow gap-2 overflow-hidden">
        <aside class="w-80 flex flex-col gap-2 shrink-0 h-full">
            <div class="card p-3 bg-blue-950/20 border-blue-500/50">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[8px] uppercase font-bold text-blue-300">Posture de Force Globale</span>
                    <span class="text-[8px] text-blue-500">78% READY</span>
                </div>
                <div class="w-full bg-blue-900/30 h-1 rounded-full overflow-hidden">
                    <div class="bg-blue-500 h-full w-[78%] shadow-[0_0_8px_#3b82f6]"></div>
                </div>
                <div class="grid grid-cols-3 gap-1 mt-2 text-[7px] text-center uppercase opacity-70">
                    <div>Air: OK</div>
                    <div>Mer: OPS</div>
                    <div>Terre: ALRT</div>
                </div>
            </div>

            <div class="card p-4 flex flex-col h-[45%] overflow-hidden border-l-2 border-blue-500 side-block">
                <h2 class="text-blue-400 text-[10px] font-bold mb-3 border-b border-blue-900 pb-1 flex justify-between uppercase">
                    <span>Dépêches_EMA</span>
                    <span id="fr-news-count" class="text-blue-600 text-[8px]">00</span>
                </h2>
                <div id="france-news-feed" class="space-y-3 overflow-y-auto flex-grow pr-2"></div>
            </div>

            <div class="card p-4 flex flex-col h-[40%] overflow-hidden side-block">
                <h2 class="text-blue-400 text-[10px] font-bold mb-3 border-b border-blue-900 pb-1 uppercase tracking-widest text-[9px]">Ordre de Bataille</h2>
                <div id="unit-list" class="space-y-2 overflow-y-auto flex-grow text-[9px]"></div>
            </div>
        </aside>

        <div id="map-container" class="flex-grow card relative overflow-hidden">
            <div id="map" style="height: 100%; width: 100%;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([20, 45], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let unitMarkers = L.layerGroup().addTo(map);

        function updateClocks() {
            const opt = { hour: '2-digit', minute: '2-digit', hour12: false };
            document.getElementById('clock-par').innerText = new Date().toLocaleTimeString('fr-FR', { ...opt, timeZone: 'Europe/Paris' });
            document.getElementById('clock-dji').innerText = new Date().toLocaleTimeString('fr-FR', { ...opt, timeZone: 'Africa/Djibouti' });
            document.getElementById('clock-nou').innerText = new Date().toLocaleTimeString('fr-FR', { ...opt, timeZone: 'Pacific/Noumea' });
        }
        setInterval(updateClocks, 1000); updateClocks();

        async function updateFrance() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                
                const franceNews = d.news.filter(n => n.france_related).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)); 
                document.getElementById('fr-news-count').innerText = franceNews.length.toString().padStart(2, '0');
                
                document.getElementById('france-news-feed').innerHTML = franceNews.map(n => `
                    <div class="p-2 border-l-2 border-blue-600 bg-blue-900/10 mb-2">
                        <div class="flex justify-between text-[8px] mb-1 opacity-60 uppercase font-bold italic">
                            <span>${n.source}</span>
                            <span>${n.date} ${n.time}</span>
                        </div>
                        <p class="text-white text-[9px] leading-tight font-bold uppercase">${n.text}</p>
                    </div>
                `).join('');

                document.getElementById('unit-list').innerHTML = d.france.forces.map((u, i) => `
                    <div class="p-2 bg-blue-900/10 border border-blue-800/40 cursor-pointer hover:bg-blue-800/30 transition-all" onclick="map.flyTo([${u.p}], 6)">
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-white uppercase">${u.n}</span>
                            <span class="status-badge ${i === 0 ? 'badge-alert' : 'badge-ops'}">${i === 0 ? 'Alerte' : 'Ops'}</span>
                        </div>
                        <div class="text-[8px] opacity-60 mt-1 uppercase italic">${u.t} // ${u.s}</div>
                    </div>
                `).join('');

                unitMarkers.clearLayers();
                d.france.forces.forEach(u => {
                    // Marker principal
                    L.circleMarker(u.p, {radius: 4, color: '#ffffff', weight: 1, fillColor: '#2563eb', fillOpacity: 1}).addTo(unitMarkers);
                    // Zone radar autour de l'unité
                    L.circle(u.p, { radius: 250000, className: 'radar-zone' }).addTo(unitMarkers);
                });

            } catch (err) { console.error("Sync fail"); }
        }
        setInterval(updateFrance, 60000); updateFrance();
    </script>
</body>
</html>
