<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRANCE // FORCE DE PROJECTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020617; color: #93c5fd; font-family: 'JetBrains Mono'; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .card { background: rgba(15, 23, 42, 0.9); border: 1px solid #1e3a8a; }
        .status-badge { font-size: 7px; padding: 1px 4px; border-radius: 2px; text-transform: uppercase; font-weight: bold; }
        .badge-alert { background: #ef4444; color: white; animation: pulse 1.5s infinite; }
        .badge-ops { background: #2563eb; color: white; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; }
    </style>
</head>
<body class="p-2 gap-2 flex flex-col">
    <header class="p-3 card flex justify-between items-center shrink-0 border-b-2 border-blue-600">
        <h1 class="text-[9px] md:text-xs font-bold text-white uppercase tracking-widest flex items-center gap-2">
            <span class="w-2 h-2 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></span> EMA // SITREP FRANCE
        </h1>
        <div class="flex items-center gap-4">
            <span id="sync-status" class="text-[8px] text-blue-500 font-bold font-mono">SCAN_ACTIVE</span>
            <a href="index.html" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 text-[10px] text-white font-bold transition-all">TERMINAL PRINCIPAL</a>
        </div>
    </header>

    <div id="content-wrapper" class="flex flex-grow gap-2 overflow-hidden">
        <aside class="w-80 flex flex-col gap-2 shrink-0 h-full">
            <div class="card p-4 flex flex-col h-1/2 overflow-hidden border-l-2 border-blue-500">
                <h2 class="text-blue-400 text-[10px] font-bold mb-3 border-b border-blue-900 pb-1 flex justify-between">
                    <span>DÉPÊCHES_EMA</span>
                    <span id="fr-news-count" class="text-blue-600 text-[8px]">00</span>
                </h2>
                <div id="france-news-feed" class="space-y-3 overflow-y-auto flex-grow pr-2"></div>
            </div>

            <div class="card p-4 flex flex-col h-1/2 overflow-hidden">
                <h2 class="text-blue-400 text-[10px] font-bold mb-3 border-b border-blue-900 pb-1 uppercase tracking-widest">Ordre de Bataille</h2>
                <div id="unit-list" class="space-y-2 overflow-y-auto flex-grow text-[9px]"></div>
            </div>
        </aside>

        <div id="map-container" class="flex-grow card relative overflow-hidden">
            <div id="map" style="height: 100%; width: 100%;"></div>
            <div class="absolute top-4 right-4 z-[1000] card p-2 text-[8px] bg-black/80 border-blue-900">
                <div class="flex flex-col gap-1">
                    <div class="flex justify-between gap-4"><span>ALERTE_GÉO:</span> <span class="text-green-500">NOMINAL</span></div>
                    <div class="flex justify-between gap-4"><span>SATELLITE:</span> <span class="text-blue-400">CONNECTÉ</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([20, 45], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let unitMarkers = L.layerGroup().addTo(map);

        async function updateFrance() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                
                // --- TRI CORRIGÉ : RÉCENT (ex: 12:00) EN HAUT, ANCIEN (ex: 09:00) EN BAS ---
                const franceNews = d.news
                    .filter(n => n.france_related)
                    .sort((a, b) => b.time.localeCompare(a.time)); 

                document.getElementById('fr-news-count').innerText = franceNews.length.toString().padStart(2, '0');
                
                document.getElementById('france-news-feed').innerHTML = franceNews.map(n => `
                    <div class="p-2 border-l-2 border-blue-600 bg-blue-900/10 mb-2">
                        <div class="flex justify-between text-[8px] mb-1 opacity-60 uppercase font-bold">
                            <span>DIRECT_EMA</span>
                            <span>${n.time}</span>
                        </div>
                        <p class="text-white text-[9px] leading-tight">${n.text}</p>
                    </div>
                `).join('');

                document.getElementById('unit-list').innerHTML = d.france.forces.map((u, i) => `
                    <div class="p-2 bg-blue-900/10 border border-blue-800/40 cursor-pointer hover:bg-blue-800/30 transition-all" onclick="map.flyTo([${u.p}], 6)">
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-white">${u.n}</span>
                            <span class="status-badge ${i === 0 ? 'badge-alert' : 'badge-ops'}">${i === 0 ? 'En Alerte' : 'En Mission'}</span>
                        </div>
                        <div class="text-[8px] opacity-60 mt-1 uppercase">${u.t} // ${u.s}</div>
                    </div>
                `).join('');

                unitMarkers.clearLayers();
                d.france.forces.forEach(u => {
                    L.circleMarker(u.p, {radius: 6, color: '#ffffff', weight: 1, fillColor: '#2563eb', fillOpacity: 0.9}).addTo(unitMarkers);
                });

                document.getElementById('sync-status').innerText = "LAST_SCAN: " + d.last_update;
            } catch (err) { console.error("Sync fail"); }
        }
        setInterval(updateFrance, 60000); updateFrance();
    </script>
</body>
</html>
