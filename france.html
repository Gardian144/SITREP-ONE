<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRANCE // FORCE DE PROJECTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        /* BASE PC */
        body { background: #020617; color: #93c5fd; font-family: 'JetBrains Mono'; height: 100vh; overflow: hidden; display: flex; flex-direction: column; margin: 0; }
        .card { background: rgba(15, 23, 42, 0.9); border: 1px solid #1e3a8a; }
        
        #content-wrapper { display: flex; flex-grow: 1; gap: 10px; padding: 10px; overflow: hidden; }
        
        /* Sidebar PC : Largeur fixe de 380px pour éviter l'écrasement */
        aside { width: 380px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        
        /* Gestion des hauteurs internes sur PC */
        .side-block-news { flex: 2; min-height: 0; display: flex; flex-direction: column; }
        .side-block-units { flex: 1; min-height: 0; display: flex; flex-direction: column; }
        
        #france-news-feed, #unit-list { overflow-y: auto; flex-grow: 1; }
        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; }

        /* SCROLLBAR STYLE */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 2px; }

        /* ADAPTATION MOBILE */
        @media (max-width: 768px) {
            #content-wrapper { flex-direction: column !important; height: calc(100vh - 70px) !important; padding: 5px; gap: 5px; }
            #map-container { height: 35% !important; order: -1; flex-shrink: 0; }
            aside { width: 100% !important; height: 65% !important; }
            .side-block-news, .side-block-units { height: 50% !important; flex: none !important; }
            
            /* Texte plus petit sur mobile */
            h1 { font-size: 9px !important; }
            .text-dynamic { font-size: 8px !important; }
        }
    </style>
</head>
<body class="p-2">
    <header class="p-3 card flex justify-between items-center shrink-0 border-b-2 border-blue-600 mb-2">
        <h1 class="text-[10px] md:text-sm font-bold text-white uppercase tracking-widest flex items-center gap-2">
            <span class="w-2 h-2 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></span> SITREP FRANCE
        </h1>
        <div class="flex items-center gap-3">
            <span class="hidden md:inline text-[9px] text-green-400 font-bold uppercase">CYBER: LVL 01</span>
            <a href="index.html" class="bg-blue-600 px-3 py-1 text-[10px] text-white font-bold uppercase">Terminal</a>
        </div>
    </header>

    <div id="content-wrapper">
        <aside>
            <div class="card p-2 bg-blue-950/20 border-blue-500/50 shrink-0">
                <div class="flex justify-between text-[8px] uppercase font-bold text-blue-300">
                    <span>Posture de Force</span><span>78%</span>
                </div>
                <div class="w-full bg-blue-900/30 h-1 mt-1 rounded-full overflow-hidden">
                    <div class="bg-blue-500 h-full w-[78%]"></div>
                </div>
            </div>

            <div class="card p-3 side-block-news border-l-2 border-blue-500">
                <h2 class="text-blue-400 text-[10px] md:text-xs font-bold mb-2 border-b border-blue-900 pb-1 flex justify-between uppercase">
                    <span>Dépêches_EMA</span><span id="fr-news-count" class="text-blue-600">00</span>
                </h2>
                <div id="france-news-feed" class="space-y-2 pr-1 text-dynamic"></div>
            </div>

            <div class="card p-3 side-block-units">
                <h2 class="text-blue-400 text-[10px] md:text-xs font-bold mb-2 border-b border-blue-900 pb-1 uppercase">Ordre de Bataille</h2>
                <div id="unit-list" class="space-y-1 text-[9px] md:text-[10px] pr-1"></div>
            </div>
        </aside>

        <div id="map-container" class="card overflow-hidden">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([20, 45], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function updateFrance() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                const fn = d.news.filter(n => n.france_related);
                document.getElementById('fr-news-count').innerText = fn.length.toString().padStart(2, '0');
                
                document.getElementById('france-news-feed').innerHTML = fn.map(n => `
                    <div class="p-2 border-l border-blue-600 bg-blue-900/10 mb-1">
                        <div class="flex justify-between text-[7px] mb-1 opacity-60 font-bold italic"><span>${n.source}</span><span>${n.time}</span></div>
                        <p class="text-white leading-tight uppercase font-bold text-[9px] md:text-[10px]">${n.text}</p>
                    </div>`).join('');
                
                document.getElementById('unit-list').innerHTML = d.france.forces.map((u, i) => `
                    <div class="p-2 bg-blue-900/10 border border-blue-800/40 cursor-pointer hover:bg-blue-800/30" onclick="map.flyTo([${u.p}], 6)">
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-white uppercase text-[8px] md:text-[10px]">${u.n}</span>
                            <span class="text-[7px] bg-blue-600 px-1 rounded text-white font-bold uppercase">Active</span>
                        </div>
                    </div>`).join('');
            } catch (err) {}
        }
        updateFrance(); setInterval(updateFrance, 60000);
    </script>
</body>
</html>
