<body>
    <header class="flex justify-between items-center px-4 py-2 tactical-panel border-b-2 border-blue-600">
        <div class="flex items-center gap-3 font-[Orbitron]">
            <div class="w-2 h-2 bg-blue-600 rounded-full animate-pulse shadow-[0_0_8px_#2563eb]"></div>
            <h1 class="text-xs md:text-sm tracking-widest font-bold">EMA // DISPOSITIF FRANCE</h1>
        </div>
        <a href="index.html" class="cmd-btn">RETOUR GLOBAL</a>
    </header>

    <main id="main-grid" class="flex-grow grid grid-cols-12 gap-2 p-2">
        <section class="col-span-12 md:col-span-8 tactical-panel relative h-[50vh] md:h-full">
            <div id="map"></div>
        </section>

        <aside class="col-span-12 md:col-span-4 flex flex-col gap-2 overflow-hidden">
            <div class="tactical-panel p-3 overflow-y-auto h-1/2">
                <h2 class="text-[10px] font-bold text-blue-400 border-b border-blue-900 pb-1 mb-2">ACTIVITÉ AÉRIENNE DU JOUR</h2>
                <div id="air-feed" class="space-y-2"></div>
            </div>
            <div class="tactical-panel p-3 overflow-y-auto h-1/2 border-l-2 border-blue-500">
                <h2 class="text-[10px] font-bold text-white mb-2">ORDRE DE BATAILLE NAVAL</h2>
                <div id="navy-feed" class="space-y-2"></div>
            </div>
        </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([25, 42], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function update() {
            const res = await fetch('data.json?v=' + Date.now());
            const data = await res.json();
            
            // Update Air Feed
            const air = document.getElementById('air-feed');
            air.innerHTML = data.tactical.air_ops.map(op => `
                <div class="text-[9px] p-2 bg-blue-900/10 border-l border-blue-400">
                    <b class="text-white">${op.unit}</b> - ${op.mission}<br>
                    <span class="text-blue-300">SECTEUR : ${op.zone}</span>
                </div>
            `).join('');

            // Update Navy Feed & Map
            const navy = document.getElementById('navy-feed');
            navy.innerHTML = '';
            data.tactical.navy.forEach(s => {
                navy.innerHTML += `
                    <div class="text-[9px] p-2 bg-slate-900/50">
                        <b class="text-blue-400">${s.n}</b><br>
                        ACTION : ${s.act}
                    </div>`;
                L.circleMarker([s.lat, s.lng], {radius: 6, color: '#2563eb', fillOpacity: 0.8})
                 .addTo(map).bindTooltip(s.n, {permanent: true, className: 'base-label'});
            });
        }
        update();
    </script>
</body>
