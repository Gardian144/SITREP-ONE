<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRANCE // FORCE DE PROJECTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020617; color: #93c5fd; font-family: 'JetBrains Mono'; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .card { background: rgba(15, 23, 42, 0.9); border: 1px solid #1e3a8a; }
        .france-news-card { border-left: 2px solid #2563eb; background: rgba(37, 99, 235, 0.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; }
    </style>
</head>
<body class="p-2 gap-2 flex flex-col">
    <header class="p-3 card flex justify-between items-center shrink-0">
        <h1 class="text-[9px] md:text-xs font-bold text-white uppercase tracking-widest flex items-center gap-2">
            <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> EMA // SITREP FRANCE
        </h1>
        <div class="flex items-center gap-4">
            <span id="sync-status" class="text-[8px] text-blue-500 uppercase">INITIALISATION...</span>
            <a href="index.html" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 text-[10px] text-white font-bold transition-all">RETOUR QG</a>
        </div>
    </header>

    <div id="content-wrapper" class="flex flex-grow gap-2 overflow-hidden">
        <aside class="w-80 flex flex-col gap-2 shrink-0 h-full">
            <div class="card p-4 flex flex-col h-1/2 overflow-hidden border-b-2 border-blue-600">
                <h2 class="text-blue-400 text-[10px] font-bold mb-3 border-b border-blue-900 pb-1 flex justify-between">
                    <span>FLUX_DÉFENSE_FRANCE</span>
                    <span class="text-[8px] opacity-50">AUTO_FILTER</span>
                </h2>
                <div id="france-news-feed" class="space-y-3 overflow-y-auto pr-2"></div>
            </div>

            <div class="card p-4 flex flex-col h-1/2 overflow-hidden">
                <h2 class="text-blue-400 text-[10px] font-bold mb-3 border-b border-blue-900 pb-1 uppercase tracking-widest">Ordre de Bataille</h2>
                <div id="unit-list" class="space-y-2 overflow-y-auto text-[10px]"></div>
            </div>
        </aside>

        <div id="map-container" class="flex-grow card relative">
            <div id="map" style="height: 100%; width: 100%;"></div>
            <div class="absolute bottom-4 left-4 z-[1000] card p-3 bg-black/80 border-blue-600">
                <p class="text-[10px] text-blue-400 font-bold mb-1">ÉTAT DE LA FORCE : <span class="text-green-500">NOMINAL</span></p>
                <p class="text-[8px] opacity-70">RÉSEAU SATELLITE ACTIF - SCAN EN COURS</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([20, 45], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let unitMarkers = L.layerGroup().addTo(map);

        async function updateFrance() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                
                // 1. News filtrées France
                const franceNews = d.news.filter(n => n.france_related);
                document.getElementById('france-news-feed').innerHTML = franceNews.length > 0 
                    ? franceNews.map(n => `
                        <div class="p-2 france-news-card mb-2">
                            <div class="flex justify-between text-[8px] mb-1">
                                <span class="text-blue-400 font-bold">DÉPÊCHE_FR</span>
                                <span class="text-white/40">${n.time}</span>
                            </div>
                            <p class="text-white text-[9px] leading-tight uppercase">${n.text}</p>
                        </div>
                    `).join('')
                    : '<p class="text-[9px] opacity-40 italic text-center mt-10">AUCUNE INFO SPÉCIFIQUE DÉTECTÉE</p>';

                // 2. Unités
                document.getElementById('unit-list').innerHTML = d.france.forces.map(u => `
                    <div class="p-2 bg-blue-900/10 border border-blue-800/40 cursor-pointer hover:bg-blue-800/30 transition-all" onclick="map.flyTo([${u.p}], 6)">
                        <div class="flex justify-between font-bold"><span>${u.n}</span><span class="text-blue-400 text-[8px]">${u.s}</span></div>
                        <div class="text-[9px] opacity-60 uppercase">${u.t}</div>
                    </div>
                `).join('');

                // 3. Carte
                unitMarkers.clearLayers();
                d.france.forces.forEach(u => {
                    L.circleMarker(u.p, {radius: 6, color: '#ffffff', weight: 1, fillColor: '#2563eb', fillOpacity: 0.9})
                    .addTo(unitMarkers).bindTooltip(u.n);
                });

                document.getElementById('sync-status').innerText = "À JOUR : " + d.last_update;
            } catch (err) { document.getElementById('sync-status').innerText = "SYNC ERROR"; }
        }
        setInterval(updateFrance, 60000); updateFrance();
    </script>
</body>
</html>
