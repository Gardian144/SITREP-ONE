<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FRANCE // FORCE DE PROJECTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #020617; color: #93c5fd; font-family: 'JetBrains Mono'; height: 100vh; overflow: hidden; }
        .card { background: rgba(15, 23, 42, 0.9); border: 1px solid #1e3a8a; }
    </style>
</head>
<body class="flex flex-col p-2 gap-2">
    <header class="p-3 card flex justify-between items-center">
        <h1 class="text-xs font-bold text-white uppercase tracking-tighter">État-Major des Armées // SITREP FRANCE</h1>
        <a href="index.html" class="bg-blue-600 px-3 py-1 text-[10px] text-white">RETOUR QG</a>
    </header>

    <div class="flex-grow flex gap-2 overflow-hidden">
        <aside class="w-1/3 flex flex-col gap-2">
            <div class="card p-4 overflow-y-auto h-1/2">
                <h2 class="text-blue-400 text-[10px] font-bold mb-4 border-b border-blue-900">ORDRE DE BATAILLE</h2>
                <div id="unit-list" class="space-y-3"></div>
            </div>
            <div class="card p-4 overflow-y-auto h-1/2">
                <h2 class="text-blue-400 text-[10px] font-bold mb-4 border-b border-blue-900">EXERCICES & MISSIONS</h2>
                <div id="exo-list" class="space-y-2 text-[10px]"></div>
            </div>
        </aside>
        <div id="map" class="flex-grow card"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([25, 45], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function updateFrance() {
            const r = await fetch('data.json');
            const d = await r.json();

            // Unités
            document.getElementById('unit-list').innerHTML = d.france.forces.map(u => `
                <div class="p-2 bg-blue-900/20 border border-blue-800">
                    <div class="flex justify-between text-[10px] mb-1 font-bold">
                        <span class="text-white">${u.n}</span>
                        <span class="text-blue-400 text-[8px]">${u.s}</span>
                    </div>
                    <div class="text-[9px] opacity-60">${u.t}</div>
                </div>
            `).join('');

            // Exercices
            document.getElementById('exo-list').innerHTML = d.france.exercices.map(e => `
                <div class="p-2 border-l-2 border-blue-500 bg-blue-500/5 mb-1">${e}</div>
            `).join('');

            // Markers
            d.france.forces.forEach(u => {
                L.circleMarker(u.p, {radius: 7, color: '#fff', fillColor: '#2563eb', fillOpacity: 1}).addTo(map)
                 .bindTooltip(u.n);
            });
        }
        updateFrance();
    </script>
</body>
</html>
