<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SITREP-ONE // ARCHIVES_CENTRAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #050505; color: #00ff66; font-family: 'JetBrains Mono'; padding: 20px; }
        .timeline-line { position: absolute; left: 19px; top: 0; bottom: 0; width: 1px; background: #004411; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #004411; }
    </style>
</head>
<body class="max-w-4xl mx-auto">
    <header class="mb-10 border-b border-green-900 pb-6 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter italic uppercase">Archives Intel</h1>
            <p class="text-[10px] text-green-700 font-bold uppercase">Historique des flux décryptés</p>
        </div>
        <a href="index.html" class="text-[10px] bg-green-900/20 border border-green-900 px-6 py-2 hover:bg-green-600 hover:text-black transition-all font-bold uppercase">Retour Terminal</a>
    </header>

    <div id="archives-container" class="relative"></div>

    <script>
        async function loadArchives() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                
                // Tri pur par timestamp décroissant
                const allNews = d.news.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));

                // Groupement par date en gardant l'ordre
                const groups = {};
                allNews.forEach(n => {
                    const key = n.date || "Inconnu";
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(n);
                });

                let html = '';
                for (const date in groups) {
                    html += `
                        <section class="mb-12 relative">
                            <h2 class="text-[10px] bg-green-900 text-black font-bold px-3 py-1 inline-block mb-6 uppercase tracking-widest">Période : ${date}</h2>
                            <div class="timeline-line"></div>
                            <div class="space-y-6">
                                ${groups[date].map(n => `
                                    <div class="relative pl-12 group">
                                        <div class="absolute left-[15px] top-2 w-2 h-2 rounded-full bg-green-900 border border-black z-10 group-hover:bg-green-500"></div>
                                        <div class="bg-white/5 border border-white/10 p-4 group-hover:border-green-900/50 transition-all">
                                            <div class="flex justify-between text-[9px] mb-2 font-bold opacity-50 uppercase">
                                                <span>SOURCE: ${n.source}</span>
                                                <span class="${n.urgent ? 'text-red-600' : 'text-green-800'}">${n.urgent ? 'Priorité Alpha' : 'Priorité Beta'}</span>
                                            </div>
                                            <div class="flex gap-4">
                                                <span class="text-blue-500 font-bold text-xs">${n.time}</span>
                                                <p class="text-white text-xs leading-relaxed uppercase font-bold">${n.text}</p>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>
                    `;
                }
                document.getElementById('archives-container').innerHTML = html || "SITUATION NOMINALE : AUCUNE DONNÉE";
            } catch(e) { console.error(e); }
        }
        loadArchives();
    </script>
</body>
</html>
